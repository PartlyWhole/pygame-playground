<script>
// ---------------------------------------------------------------- examples
const EXAMPLES = {
  "Swimming fish": String.raw`# PartlyWhole — two fish swimming in circles (procedural chain animation).
# Move the mouse over the canvas and they follow it.
import pygame, math, random

W, H = 640, 480
S = 0.26                 # fish scale
TAU = math.tau

pygame.init()
screen = pygame.display.set_mode((W, H))
pygame.display.set_caption("PartlyWhole - swimming in circles")
clock = pygame.time.Clock()
overlay = pygame.Surface((W, H), pygame.SRCALPHA)

def polar(angle, length=1.0):
    return pygame.Vector2(math.cos(angle), math.sin(angle)) * length

def wrap(angle):         # wrap to (-pi, pi]
    return (angle + math.pi) % TAU - math.pi

def clamp(x, lo, hi):
    return max(lo, min(hi, x))

def smooth(pts, steps=6):    # closed Catmull-Rom spline through pts
    out = []
    for i in range(len(pts)):
        p0, p1, p2, p3 = pts[i - 1], pts[i], pts[(i + 1) % len(pts)], pts[(i + 2) % len(pts)]
        for k in range(steps):
            t = k / steps
            out.append(0.5 * (2 * p1 + (p2 - p0) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t * t
                              + (3 * p1 - 3 * p2 + p3 - p0) * t ** 3))
    return out

def ellipse(c, rx, ry, rot, steps=18):
    return [c + pygame.Vector2(rx * math.cos(k * TAU / steps),
                               ry * math.sin(k * TAU / steps)).rotate_rad(rot)
            for k in range(steps)]

def draw_shape(pts, color):
    pygame.draw.polygon(screen, color, pts)
    pygame.draw.aalines(screen, (170, 185, 200), True, pts)

class Chain:             # joints trail the head, bending at most self.bend per link
    def __init__(self, n, link, bend):
        self.link, self.bend = link, bend
        self.joints = [pygame.Vector2(W / 2, H / 2 + i * link) for i in range(n)]
        self.angles = [0.0] * n

    def resolve(self, head):
        d = head - self.joints[0]
        self.angles[0] = math.atan2(d.y, d.x)
        self.joints[0] = pygame.Vector2(head)
        for i in range(1, len(self.joints)):
            d = self.joints[i - 1] - self.joints[i]
            want = math.atan2(d.y, d.x)
            self.angles[i] = self.angles[i - 1] + clamp(wrap(want - self.angles[i - 1]),
                                                        -self.bend, self.bend)
            self.joints[i] = self.joints[i - 1] - polar(self.angles[i], self.link)

class Fish:
    WIDTHS = [w * S for w in (68, 81, 84, 83, 77, 64, 51, 38, 32, 19)]

    def __init__(self, hue):
        self.hue = hue
        self.heading = 0.0
        self.spine = Chain(12, 64 * S, math.pi / 8)

    def side(self, i, off, extra=0.0):   # point on the body edge at joint i
        return self.spine.joints[i] + polar(self.spine.angles[i] + off, self.WIDTHS[i] + extra)

    def swim(self, target):              # turn-rate-limited pursuit
        head = self.spine.joints[0]
        d = target - head
        self.heading += clamp(wrap(math.atan2(d.y, d.x) - self.heading), -0.04, 0.04)
        self.spine.resolve(head + polar(self.heading, min(d.length(), 8 * S)))

    def draw(self):
        j, a = self.spine.joints, self.spine.angles
        body, fin = pygame.Color(0), pygame.Color(0)
        body.hsva = (self.hue % 360, 85, 72, 100)
        fin.hsva = (self.hue % 360, 55, 85, 100)
        curve = wrap(a[6] - a[0]) + wrap(a[11] - a[6])   # spine curvature bends the fins

        for s in (1, -1):                                # pectoral + ventral fin pairs
            draw_shape(ellipse(self.side(3, s * math.pi / 3), 80 * S, 32 * S, a[2] - s * math.pi / 4), fin)
            draw_shape(ellipse(self.side(7, s * math.pi / 2), 48 * S, 16 * S, a[6] - s * math.pi / 4), fin)

        tail = [j[i] + polar(a[i] - math.pi / 2, 1.5 * curve * (i - 8) ** 2) for i in range(8, 12)]
        tail += [j[i] + polar(a[i] + math.pi / 2, clamp(curve * 6, -13 * S, 13 * S)) for i in (11, 10, 9, 8)]
        draw_shape(smooth(tail), fin)

        outline = [self.side(i, math.pi / 2) for i in range(10)]   # body silhouette
        outline.append(self.side(9, math.pi))
        outline += [self.side(i, -math.pi / 2) for i in range(9, -1, -1)]
        outline += [self.side(0, -math.pi / 6), self.side(0, 0, 4 * S), self.side(0, math.pi / 6)]
        draw_shape(smooth(outline), body)

        m1, m2 = wrap(a[6] - a[0]), wrap(a[7] - a[0])
        dorsal = [j[4], j[5], j[6], j[7],
                  j[6] + polar(a[6] + math.pi / 2, m2 * 16 * S),
                  j[5] + polar(a[5] + math.pi / 2, m1 * 16 * S)]
        draw_shape(smooth(dorsal), fin)

class Bubble:
    def __init__(self):
        self.respawn()
        self.y = random.uniform(0, H)

    def respawn(self):
        self.x, self.y = random.uniform(0, W), H + 10
        self.r = random.uniform(1, 4)
        self.speed = random.uniform(0.3, 1.1)
        self.wobble = random.uniform(0, TAU)
        self.alpha = random.randint(20, 60)

    def update(self):
        self.y -= self.speed
        self.wobble += 0.02
        self.x += math.sin(self.wobble) * 0.3
        if self.y < -10:
            self.respawn()
        pygame.draw.circle(overlay, (180, 220, 255, self.alpha), (self.x, self.y), self.r, 1)

def caustics(t):         # drifting light blobs on the water
    for i in range(6):
        c = pygame.Vector2(W * 0.3 + math.sin(t * 0.0003 + i * 1.2) * W * 0.3,
                           H * 0.3 + math.cos(t * 0.0004 + i * 0.9) * H * 0.3)
        r = 80 + math.sin(t * 0.001 + i) * 40
        pygame.draw.polygon(overlay, (74, 143, 184, 8), ellipse(c, r, r * 0.6, t * 0.0001 + i))

fish = [Fish(0), Fish(180)]
bubbles = [Bubble() for _ in range(30)]
ORBIT = (11 * 64 * S + max(Fish.WIDTHS) * 6) / math.pi   # two fish share the circle without overlap
center = pygame.Vector2(W / 2, H / 2)
label = pygame.font.Font(None, 26).render("PartlyWhole", True, (255, 255, 255))
label.set_alpha(110)

def swim_all(t):
    for f, phase, woff in ((fish[1], math.pi, math.pi * 0.7), (fish[0], 0.0, 0.0)):
        wiggle = math.sin(t * 0.003 + woff) * ORBIT * 0.08
        f.swim(center + polar(t * 0.0009 + phase + 0.5, ORBIT + wiggle))

for i in range(400):     # warm-up so the fish start mid-glide
    swim_all(i * 16.0)

t = 0.0
mouse = pygame.Vector2(W / 2, H / 2)
while True:
    for e in pygame.event.get():
        if e.type == pygame.QUIT:
            raise SystemExit
        if e.type == pygame.MOUSEMOTION:
            mouse.update(e.pos)
    center += (mouse - center) * 0.03

    for f in fish:
        f.hue += 0.2     # complementary pair drifts around the color wheel
    swim_all(t)

    screen.fill((10, 22, 40))
    overlay.fill((0, 0, 0, 0))
    caustics(t)
    for b in bubbles:
        b.update()
    screen.blit(overlay, (0, 0))
    for f in (fish[1], fish[0]):
        f.draw()
    screen.blit(label, (W / 2 - label.get_width() / 2, 14))

    pygame.display.flip()
    t += clock.tick(60)
`,

  "Snake": String.raw`# Arrow keys to steer. R restarts after game over. (Click the canvas first!)
import pygame, random

CELL, COLS, ROWS = 20, 32, 24

def main():
    pygame.init()
    screen = pygame.display.set_mode((COLS * CELL, ROWS * CELL))
    clock = pygame.time.Clock()
    font = pygame.font.Font(None, 42)

    while True:  # one iteration per game
        snake = [(COLS // 2, ROWS // 2)]
        d = (1, 0)
        food = (random.randrange(COLS), random.randrange(ROWS))
        score, alive = 0, True

        while alive:
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    raise SystemExit
                if event.type == pygame.KEYDOWN:
                    if event.key == pygame.K_LEFT  and d != (1, 0):  d = (-1, 0)
                    if event.key == pygame.K_RIGHT and d != (-1, 0): d = (1, 0)
                    if event.key == pygame.K_UP    and d != (0, 1):  d = (0, -1)
                    if event.key == pygame.K_DOWN  and d != (0, -1): d = (0, 1)

            head = (snake[0][0] + d[0], snake[0][1] + d[1])
            if (head in snake or not (0 <= head[0] < COLS) or not (0 <= head[1] < ROWS)):
                alive = False
            else:
                snake.insert(0, head)
                if head == food:
                    score += 1
                    food = (random.randrange(COLS), random.randrange(ROWS))
                else:
                    snake.pop()

            screen.fill((15, 18, 15))
            fx, fy = food
            pygame.draw.rect(screen, (235, 90, 90), (fx * CELL + 2, fy * CELL + 2, CELL - 4, CELL - 4), border_radius=6)
            for i, (sx, sy) in enumerate(snake):
                g = max(90, 210 - i * 6)
                pygame.draw.rect(screen, (70, g, 90), (sx * CELL + 1, sy * CELL + 1, CELL - 2, CELL - 2), border_radius=4)
            img = font.render(str(score), True, (200, 210, 200))
            screen.blit(img, (10, 6))
            pygame.display.flip()
            clock.tick(9 + score // 3)

        # game over screen
        img = font.render(f"Game over — {score} points. Press R", True, (240, 220, 180))
        screen.blit(img, img.get_rect(center=(COLS * CELL // 2, ROWS * CELL // 2)))
        pygame.display.flip()
        waiting = True
        while waiting:
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    raise SystemExit
                if event.type == pygame.KEYDOWN and event.key == pygame.K_r:
                    waiting = False
            clock.tick(30)

main()
`,

const BOOT_PY = String.raw`
import sys, os, ast, asyncio, traceback, copy

import pygame

_state = {"task": None, "delay": 0.0, "flipped": False, "ticked": False, "n": 0}

_orig_flip = pygame.display.flip
def _flip(*a, **k):
    _state["flipped"] = True
    return _orig_flip(*a, **k)
pygame.display.flip = _flip

_orig_update = pygame.display.update
def _update(*a, **k):
    _state["flipped"] = True
    return _orig_update(*a, **k)
pygame.display.update = _update

class _Clock:
    """Clock whose tick() never busy-waits: it banks the frame budget and the
    injected loop yield sleeps it off cooperatively."""
    def __init__(self):
        self._last = pygame.time.get_ticks()
        self._dt = 0
    def tick(self, fps=0):
        now = pygame.time.get_ticks()
        self._dt = now - self._last
        self._last = now
        _state["ticked"] = True
        if fps:
            _state["delay"] = max(0.0, 1.0 / fps - self._dt / 1000.0)
        return self._dt
    tick_busy_loop = tick
    def get_time(self): return self._dt
    def get_rawtime(self): return self._dt
    def get_fps(self):
        return 1000.0 / self._dt if self._dt else 0.0
pygame.time.Clock = _Clock

def _delay(ms):
    _state["delay"] += ms / 1000.0
    return int(ms)
pygame.time.delay = _delay
pygame.time.wait = _delay

# Pyodide's time.sleep busy-waits on the browser main thread and freezes the
# whole page. Statement-level sleeps are rewritten to real awaits by
# _AsyncSleeps below; this banking fallback covers sleeps in sync helper
# functions so nothing can ever block the tab.
import time as _time_mod
def _bank_sleep(secs):
    try:
        _state["delay"] += max(0.0, float(secs))
    except Exception:
        pass
_time_mod.sleep = _bank_sleep

async def __sleep__(secs):
    try:
        secs = max(0.0, float(secs))
    except Exception:
        secs = 0.0
    await asyncio.sleep(secs)

async def __yield__():
    d, t, f = _state["delay"], _state["ticked"], _state["flipped"]
    _state["delay"] = 0.0
    _state["ticked"] = False
    _state["flipped"] = False
    if d > 0:
        await asyncio.sleep(d)
    elif t:
        await asyncio.sleep(0)
    elif f:
        await asyncio.sleep(1 / 60)       # flip but no tick: default to ~60fps
    else:
        _state["n"] += 1
        if _state["n"] % 256 == 0:        # plain compute loop: yield occasionally
            await asyncio.sleep(0)

_YIELD = ast.parse("await __yield__()").body[0]

def _walk_shallow(node):
    """Walk child nodes without entering nested function/class scopes."""
    stack = list(ast.iter_child_nodes(node))
    while stack:
        n = stack.pop()
        yield n
        if not isinstance(n, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
            stack.extend(ast.iter_child_nodes(n))

def _is_gameloop(w):
    for n in _walk_shallow(w):
        if isinstance(n, ast.Call) and isinstance(n.func, ast.Attribute):
            if n.func.attr in ("flip", "tick", "tick_busy_loop"):
                return True
            if (n.func.attr == "update" and isinstance(n.func.value, ast.Attribute)
                    and n.func.value.attr == "display"):
                return True
            if (n.func.attr in ("get", "poll", "wait") and isinstance(n.func.value, ast.Attribute)
                    and n.func.value.attr == "event"):
                return True
    return False

class _Asyncify(ast.NodeTransformer):
    """def f(): while ...flip()...  ->  async def f(), remembering names."""
    def __init__(self):
        self.converted = set()
    def visit_ClassDef(self, node):
        return node
    def visit_FunctionDef(self, node):
        for n in _walk_shallow(node):
            if isinstance(n, ast.While) and _is_gameloop(n):
                self.converted.add(node.name)
                new = ast.AsyncFunctionDef(
                    name=node.name, args=node.args, body=node.body,
                    decorator_list=node.decorator_list, returns=node.returns,
                    type_comment=None)
                return ast.copy_location(new, node)
        return node

class _AwaitCalls(ast.NodeTransformer):
    """main() -> await main() for converted functions; asyncio.run(x) -> await x.
    Only in async-capable contexts (module level / async defs)."""
    def __init__(self, names):
        self.names = names
    def visit_FunctionDef(self, node):
        return node
    def visit_ClassDef(self, node):
        return node
    def visit_Expr(self, node):
        self.generic_visit(node)
        v = node.value
        if isinstance(v, ast.Call):
            f = v.func
            if (isinstance(f, ast.Attribute) and f.attr == "run"
                    and isinstance(f.value, ast.Name) and f.value.id == "asyncio" and v.args):
                node.value = ast.copy_location(ast.Await(value=v.args[0]), v)
            elif isinstance(f, ast.Name) and f.id in self.names:
                node.value = ast.copy_location(ast.Await(value=v), v)
        return node

def _time_import_names(tree):
    """Names the user's code binds to the time module / time.sleep."""
    time_aliases, sleep_names = set(), set()
    for n in ast.walk(tree):
        if isinstance(n, ast.Import):
            for a in n.names:
                if a.name == "time":
                    time_aliases.add(a.asname or "time")
        elif isinstance(n, ast.ImportFrom) and n.module == "time":
            for a in n.names:
                if a.name == "sleep":
                    sleep_names.add(a.asname or "sleep")
    return time_aliases, sleep_names

class _AsyncSleeps(ast.NodeTransformer):
    """Statement-level time.sleep(x) / pygame.time.wait(ms) / pygame.time.delay(ms)
    become real cooperative awaits in async contexts, so 'draw once then sleep'
    programs pause visibly instead of freezing the tab."""
    def __init__(self, time_aliases, sleep_names):
        self.time_aliases = time_aliases
        self.sleep_names = sleep_names
    def visit_FunctionDef(self, node):
        return node
    def visit_ClassDef(self, node):
        return node
    def visit_Expr(self, node):
        v = node.value
        if isinstance(v, ast.Call) and len(v.args) == 1 and not v.keywords:
            f = v.func
            secs = None
            if isinstance(f, ast.Name) and f.id in self.sleep_names:
                secs = v.args[0]
            elif isinstance(f, ast.Attribute):
                if (f.attr == "sleep" and isinstance(f.value, ast.Name)
                        and f.value.id in self.time_aliases):
                    secs = v.args[0]
                elif (f.attr in ("wait", "delay") and isinstance(f.value, ast.Attribute)
                        and f.value.attr == "time"):
                    secs = ast.BinOp(left=v.args[0], op=ast.Div(),
                                     right=ast.Constant(value=1000.0))
            if secs is not None:
                node.value = ast.copy_location(ast.Await(value=ast.Call(
                    func=ast.Name(id="__sleep__", ctx=ast.Load()),
                    args=[secs], keywords=[])), v)
        return node

class _InjectYield(ast.NodeTransformer):
    """Append 'await __yield__()' to every while-loop body in async contexts."""
    def visit_FunctionDef(self, node):
        return node
    def visit_ClassDef(self, node):
        return node
    def visit_While(self, node):
        self.generic_visit(node)
        node.body = node.body + [copy.deepcopy(_YIELD)]
        return node

def _transform(src):
    tree = ast.parse(src)
    a = _Asyncify()
    tree = a.visit(tree)
    tree = _AwaitCalls(a.converted).visit(tree)
    tree = _AsyncSleeps(*_time_import_names(tree)).visit(tree)
    tree = _InjectYield().visit(tree)
    ast.fix_missing_locations(tree)
    return compile(tree, "<your code>", "exec", flags=ast.PyCF_ALLOW_TOP_LEVEL_AWAIT)

async def _run(src):
    glb = {"__name__": "__main__", "__yield__": __yield__, "__sleep__": __sleep__,
           "__builtins__": __builtins__}
    try:
        code = _transform(src)
    except SyntaxError:
        traceback.print_exc(limit=0)
        return "error"
    try:
        if pygame.get_init():
            pygame.event.clear()
        res = eval(code, glb)
        if asyncio.iscoroutine(res):
            await res
        return "ok"
    except asyncio.CancelledError:
        return "stopped"
    except SystemExit:
        return "exit"
    except BaseException:
        traceback.print_exc()
        return "error"

def _start(src):
    old = _state["task"]
    if old is not None and not old.done():
        old.cancel()
    _state["delay"] = 0.0
    _state["flipped"] = False
    _state["ticked"] = False
    _state["n"] = 0
    t = asyncio.ensure_future(_run(src))
    _state["task"] = t
    return t

def _stop():
    t = _state["task"]
    if t is not None and not t.done():
        t.cancel()
        return True
    return False
`;

// ---------------------------------------------------------------- UI plumbing
const consoleEl = document.getElementById("console");
const statusEl = document.getElementById("status");
const canvasEl = document.getElementById("canvas");

function logLine(text, cls) {
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.textContent = text;
  consoleEl.appendChild(div);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}
function clearConsole() { consoleEl.textContent = ""; }
function setStatus(cls, text) { statusEl.className = cls; statusEl.textContent = text; }

const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
  mode: "python", theme: "material-darker", lineNumbers: true,
  indentUnit: 4, viewportMargin: Infinity,
  extraKeys: { "Cmd-Enter": run, "Ctrl-Enter": run },
});

const exampleSel = document.getElementById("examples");
for (const name of Object.keys(EXAMPLES)) {
  const opt = document.createElement("option");
  opt.value = opt.textContent = name;
  exampleSel.appendChild(opt);
}
function codeFromHash() {
  if (!location.hash.startsWith("#code=")) return null;
  try {
    const b64 = location.hash.slice(6).replace(/-/g, "+").replace(/_/g, "/");
    return decodeURIComponent(escape(atob(b64)));
  } catch {
    return null;
  }
}
let loadedExample = codeFromHash() ?? EXAMPLES[exampleSel.value];
editor.setValue(loadedExample);

document.getElementById("shareBtn").addEventListener("click", async () => {
  const b64 = btoa(unescape(encodeURIComponent(editor.getValue())))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  const url = location.origin + location.pathname + "#code=" + b64;
  history.replaceState(null, "", url);
  const btn = document.getElementById("shareBtn");
  try {
    await navigator.clipboard.writeText(url);
    btn.textContent = "✓ copied";
  } catch {
    btn.textContent = "✓ in URL bar";
  }
  setTimeout(() => { btn.textContent = "🔗 Share"; }, 1500);
});
exampleSel.addEventListener("change", () => {
  if (editor.getValue() !== loadedExample &&
      !confirm("Replace your current code with the example?")) {
    return;
  }
  loadedExample = EXAMPLES[exampleSel.value];
  editor.setValue(loadedExample);
  run();
});

// ---------------------------------------------------------------- pyodide boot
const PYODIDE_BASE = "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/";
let pyodide = null;
let runTask = null;

async function boot() {
  setStatus("boot", "loading Python…");
  const mod = await import(PYODIDE_BASE + "pyodide.mjs");
  pyodide = await mod.loadPyodide({ indexURL: PYODIDE_BASE });
  pyodide.setStdout({ batched: (s) => logLine(s, "out") });
  pyodide.setStderr({ batched: (s) => logLine(s, "err") });
  // Register the canvas with SDL BEFORE pygame is imported (load-bearing order),
  // and scope SDL's keyboard capture to the canvas so the editor keeps working.
  if (pyodide.canvas && pyodide.canvas.setCanvas2D) {
    pyodide.canvas.setCanvas2D(canvasEl);
  } else {
    pyodide._module.canvas = canvasEl;
  }
  pyodide.runPython(
    'import os; os.environ["SDL_EMSCRIPTEN_KEYBOARD_ELEMENT"] = "#canvas"');
  setStatus("boot", "loading pygame…");
  await pyodide.loadPackage("pygame-ce");
  await pyodide.runPythonAsync(BOOT_PY);
  setStatus("ready", "ready");
}
const booted = boot().catch((e) => {
  setStatus("error", "boot failed");
  logLine(String(e), "err");
  throw e;
});

// ---------------------------------------------------------------- run / stop
async function run() {
  try { await booted; } catch { return; }
  clearConsole();
  canvasEl.focus();
  const start = pyodide.globals.get("_start");
  const task = start(editor.getValue());
  start.destroy();
  runTask = task;
  setStatus("running", "running");
  task.then((kind) => {
    if (runTask !== task) return;
    if (kind === "error") setStatus("error", "error — see console");
    else if (kind === "stopped") { setStatus("ready", "stopped"); logLine("— stopped —", "sys"); }
    else { setStatus("ready", "finished"); logLine("— program finished —", "sys"); }
  }).catch(() => {
    if (runTask === task) setStatus("ready", "stopped");
  });
}

document.getElementById("runBtn").addEventListener("click", run);
document.getElementById("stopBtn").addEventListener("click", () => {
  if (pyodide) pyodide.runPython("_stop()");
});

// Run the default example as soon as Python is up.
booted.then(run).catch(() => {});
</script>
