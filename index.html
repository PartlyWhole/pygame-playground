<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pygame playground</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<style>
  :root {
    --bg: #14151a; --panel: #1c1e26; --edge: #2c2f3a;
    --text: #d8dae5; --dim: #8a8fa3; --accent: #7bd88f; --warn: #f0a45d; --bad: #ff6e7f;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--panel); border-bottom: 1px solid var(--edge);
    flex: 0 0 auto; position: relative;   /* anchor the #assetPanel popover */
  }
  header h1 { font-size: 15px; margin: 0 8px 0 0; font-weight: 600; }
  header h1 span { color: var(--accent); }
  button, select {
    background: #262936; color: var(--text); border: 1px solid var(--edge);
    border-radius: 6px; padding: 5px 12px; font: inherit; cursor: pointer;
  }
  button:hover, select:hover { border-color: #4a4f63; }
  #runBtn { background: #234430; border-color: #2f6a44; color: #b8f0c6; font-weight: 600; }
  #runBtn:hover { background: #2b5a3d; }
  #stopBtn { color: #f3b0ba; }
  #status {
    margin-left: auto; font-size: 12.5px; color: var(--dim);
    padding: 4px 10px; border-radius: 99px; background: #20222c; border: 1px solid var(--edge);
  }
  #status.running { color: var(--accent); }
  #status.error { color: var(--bad); }
  #status.boot { color: var(--warn); }
  main { flex: 1 1 0; display: flex; min-height: 0; }
  #editorPane { flex: 0 1 52%; min-width: 240px; display: flex; overflow: hidden; }
  .CodeMirror { flex: 1; height: auto; font-size: 13.5px; }
  #splitter { flex: 0 0 6px; cursor: col-resize; background: var(--edge); }
  #vsplit { flex: 0 0 6px; cursor: row-resize; background: var(--edge); }
  #splitter:hover, #splitter.active, #vsplit:hover, #vsplit.active { background: var(--accent); }
  #rightPane { flex: 1 1 0; display: flex; flex-direction: column; min-width: 280px; }
  #stage {
    position: relative; flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #0e0f13; padding: 12px;
  }
  /* canvas is sized by fitCanvas(): scaled to fill the stage, aspect ratio preserved.
     border is a box-shadow so it adds no layout box and the scale stays exact. */
  #canvas { background: #000; outline: none; border-radius: 4px; box-shadow: 0 0 0 1px var(--edge); }
  #canvas:focus { box-shadow: 0 0 0 1px var(--accent); }
  #fsBtn {
    position: absolute; bottom: 14px; right: 14px; padding: 3px 9px;
    font-size: 15px; line-height: 1.2; background: rgba(38, 41, 54, 0.65);
    opacity: 0.45; transition: opacity .15s;
  }
  #stage:hover #fsBtn { opacity: 1; }
  body.resizing-x { cursor: col-resize; user-select: none; }
  body.resizing-y { cursor: row-resize; user-select: none; }
  #console {
    flex: 0 0 150px; overflow-y: auto; background: #121318; padding: 8px 12px;
    font: 12px/1.5 "SF Mono", Menlo, monospace; white-space: pre-wrap;
  }
  #console .err { color: var(--bad); }
  #console .sys { color: var(--dim); font-style: italic; }
  kbd {
    background: #262936; border: 1px solid var(--edge); border-radius: 4px;
    padding: 0 5px; font-size: 11px;
  }
  .hint { color: var(--dim); font-size: 12px; }
  #liveDot { font-size: 12.5px; color: var(--accent); padding: 4px 8px; }
  #liveDot.connecting { color: var(--warn); }
  #liveDot.offline { color: var(--bad); }
  .remote-cursor { position: relative; border-left: 2px solid; margin-left: -1px; }
  .remote-flag { position: absolute; top: -1.1em; left: -1px; font-size: 10px; padding: 0 3px;
                 white-space: nowrap; color: #0b0d12; border-radius: 3px 3px 3px 0; }
  #assetChip { font-size: 12.5px; color: var(--dim); padding: 4px 8px; cursor: pointer;
               border-radius: 99px; border: 1px solid transparent; user-select: none; }
  #assetChip:hover { border-color: var(--edge); color: var(--text); }
  #assetChip.has { color: var(--accent); }
  #assetPanel { position: absolute; top: 44px; right: 14px; z-index: 20; width: 300px;
                max-height: 60vh; overflow-y: auto; background: var(--panel);
                border: 1px solid var(--edge); border-radius: 8px; padding: 10px;
                box-shadow: 0 8px 24px rgba(0,0,0,.4); font-size: 12.5px; }
  #assetPanel[hidden] { display: none; }
  #assetPanel .ap-head { display: flex; justify-content: space-between; align-items: center;
                         color: var(--dim); margin-bottom: 6px; }
  #assetPanel .ap-browse { color: var(--accent); cursor: pointer; }
  #assetPanel .asset-row { display: flex; align-items: center; gap: 6px; padding: 3px 0;
                           border-top: 1px solid var(--edge); }
  #assetPanel .asset-name { flex: 1; font-family: "SF Mono", Menlo, monospace; word-break: break-all; }
  #assetPanel .asset-size { color: var(--dim); }
  #assetPanel .asset-warn { color: var(--warn); cursor: help; }
  #assetPanel .asset-remove { color: var(--bad); cursor: pointer; border: none; background: none; font-size: 13px; }
  #assetPanel .ap-empty { color: var(--dim); padding: 4px 0; }
  #assetPanel .ap-foot { display: flex; justify-content: space-between; align-items: center;
                         color: var(--dim); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--edge); }
  #assetPanel .ap-clear { color: var(--bad); cursor: pointer; }
  #dropOverlay { position: fixed; inset: 0; z-index: 50; display: none; align-items: center;
                 justify-content: center; background: rgba(20,30,40,.78); color: var(--accent);
                 font-size: 22px; border: 3px dashed var(--accent); }
  #dropOverlay.show { display: flex; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script>
// ---------------------------------------------------------------- examples
const EXAMPLES = {
  "Swimming fish": String.raw`# Procedural fish, after argonaut's "A simple procedural animation technique"
# https://www.youtube.com/watch?v=qlfh_rv6khY
# A chain of joints trails the head; the body is drawn around the chain.
# Move the mouse over the canvas and the fish follow it.
import pygame, math, random

W, H = 640, 480
S = 0.26                                  # fish scale
TAU = math.tau

pygame.init()
screen = pygame.display.set_mode((W, H))
pygame.display.set_caption("procedural fish")
clock = pygame.time.Clock()
overlay = pygame.Surface((W, H), pygame.SRCALPHA)

def polar(angle, length=1.0):
    return pygame.Vector2(math.cos(angle), math.sin(angle)) * length

def heading(v):
    return math.atan2(v.y, v.x)

def wrap(angle):                          # to (-pi, pi]
    return (angle + math.pi) % TAU - math.pi

def steer(angle, want, limit):            # turn angle toward want, at most limit
    return angle + max(-limit, min(limit, wrap(want - angle)))

def hsva(h, s, v):
    color = pygame.Color(0)
    color.hsva = (h % 360, s, v, 100)
    return color

def smooth(pts, steps=6):                 # closed Catmull-Rom spline through pts
    out = []
    for i in range(len(pts)):
        p0, p1, p2, p3 = pts[i - 1], pts[i], pts[(i + 1) % len(pts)], pts[(i + 2) % len(pts)]
        for k in range(steps):
            t = k / steps
            out.append(0.5 * (2 * p1 + (p2 - p0) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t * t
                              + (3 * p1 - 3 * p2 + p3 - p0) * t ** 3))
    return out

def ellipse(c, rx, ry, rot, steps=18):
    return [c + pygame.Vector2(rx * math.cos(k * TAU / steps),
                               ry * math.sin(k * TAU / steps)).rotate_rad(rot)
            for k in range(steps)]

def shape(pts, color):
    pygame.draw.polygon(screen, color, pts)
    pygame.draw.aalines(screen, (170, 185, 200), True, pts)

class Chain:                              # joints trail the head, bending at most bend per link
    def __init__(self, n, link, bend):
        self.link, self.bend = link, bend
        self.joints = [pygame.Vector2(W / 2, H / 2 + i * link) for i in range(n)]
        self.angles = [0.0] * n

    def resolve(self, head):
        self.angles[0] = heading(head - self.joints[0])
        self.joints[0] = pygame.Vector2(head)
        for i in range(1, len(self.joints)):
            self.angles[i] = steer(self.angles[i - 1],
                                   heading(self.joints[i - 1] - self.joints[i]), self.bend)
            self.joints[i] = self.joints[i - 1] - polar(self.angles[i], self.link)

class Fish:
    WIDTHS = [w * S for w in (68, 81, 84, 83, 77, 64, 51, 38, 32, 19)]

    def __init__(self, hue):
        self.hue = hue
        self.dir = 0.0
        self.spine = Chain(12, 64 * S, math.pi / 8)

    def side(self, i, off, extra=0.0):    # a point on the body edge at joint i
        return self.spine.joints[i] + polar(self.spine.angles[i] + off, self.WIDTHS[i] + extra)

    def swim(self, target):               # pursue the target with a capped turn rate
        head = self.spine.joints[0]
        self.dir = steer(self.dir, heading(target - head), 0.04)
        self.spine.resolve(head + polar(self.dir, min((target - head).length(), 8 * S)))

    def draw(self):
        j, a = self.spine.joints, self.spine.angles
        body, fin = hsva(self.hue, 85, 72), hsva(self.hue, 55, 85)
        bend = wrap(a[6] - a[0]) + wrap(a[11] - a[6])     # spine curvature flexes the fins

        for s in (1, -1):                                 # pectoral and ventral fin pairs
            shape(ellipse(self.side(3, s * math.pi / 3), 80 * S, 32 * S, a[2] - s * math.pi / 4), fin)
            shape(ellipse(self.side(7, s * math.pi / 2), 48 * S, 16 * S, a[6] - s * math.pi / 4), fin)

        web = max(-13 * S, min(13 * S, bend * 6))
        tail = ([j[i] + polar(a[i] - math.pi / 2, 1.5 * bend * (i - 8) ** 2) for i in range(8, 12)]
                + [j[i] + polar(a[i] + math.pi / 2, web) for i in reversed(range(8, 12))])
        shape(smooth(tail), fin)

        outline = ([self.side(i, math.pi / 2) for i in range(10)] + [self.side(9, math.pi)]
                   + [self.side(i, -math.pi / 2) for i in reversed(range(10))]
                   + [self.side(0, o, x) for o, x in ((-math.pi / 6, 0), (0, 4 * S), (math.pi / 6, 0))])
        shape(smooth(outline), body)

        dorsal = [j[4], j[5], j[6], j[7],
                  j[6] + polar(a[6] + math.pi / 2, wrap(a[7] - a[0]) * 16 * S),
                  j[5] + polar(a[5] + math.pi / 2, wrap(a[6] - a[0]) * 16 * S)]
        shape(smooth(dorsal), fin)

class Bubble:
    def __init__(self):
        self.respawn(random.uniform(0, H))

    def respawn(self, y=H + 10):
        self.pos = pygame.Vector2(random.uniform(0, W), y)
        self.r = random.uniform(1, 4)
        self.speed = random.uniform(0.3, 1.1)
        self.phase = random.uniform(0, TAU)
        self.alpha = random.randint(20, 60)

    def update(self):
        self.phase += 0.02
        self.pos += (math.sin(self.phase) * 0.3, -self.speed)
        if self.pos.y < -10:
            self.respawn()
        pygame.draw.circle(overlay, (180, 220, 255, self.alpha), self.pos, self.r, 1)

def caustics(t):                          # drifting light blobs on the water
    for i in range(6):
        c = pygame.Vector2(W * 0.3 + math.sin(t * 0.0003 + i * 1.2) * W * 0.3,
                           H * 0.3 + math.cos(t * 0.0004 + i * 0.9) * H * 0.3)
        r = 80 + math.sin(t * 0.001 + i) * 40
        pygame.draw.polygon(overlay, (74, 143, 184, 8), ellipse(c, r, r * 0.6, t * 0.0001 + i))

fish = [Fish(0), Fish(180)]               # a complementary pair, half an orbit apart
bubbles = [Bubble() for _ in range(30)]
ORBIT = (11 * 64 * S + max(Fish.WIDTHS) * 6) / math.pi    # both fish fit the circle comfortably
center = pygame.Vector2(W / 2, H / 2)
mouse = pygame.Vector2(center)
credit = pygame.font.Font(None, 22).render("after argonaut - youtu.be/qlfh_rv6khY", True, (255, 255, 255))
credit.set_alpha(90)

def swim_all(t):
    for k, f in enumerate(fish):
        r = ORBIT * (1 + 0.08 * math.sin(t * 0.003 + k * 0.7 * math.pi))
        f.swim(center + polar(t * 0.0009 + k * math.pi + 0.5, r))

for i in range(400):                      # warm-up so the fish start mid-glide
    swim_all(i * 16.0)

t = 0.0
while True:
    for e in pygame.event.get():
        if e.type == pygame.QUIT:
            raise SystemExit
        if e.type == pygame.MOUSEMOTION:
            mouse.update(e.pos)

    center += (mouse - center) * 0.03
    swim_all(t)

    screen.fill((10, 22, 40))
    overlay.fill((0, 0, 0, 0))
    caustics(t)
    for b in bubbles:
        b.update()
    screen.blit(overlay, (0, 0))
    for f in reversed(fish):
        f.draw()
        f.hue += 0.2                      # the pair drifts around the color wheel together
    screen.blit(credit, credit.get_rect(midbottom=(W // 2, H - 10)))

    pygame.display.flip()
    t += clock.tick(60)
`,

  "Bouncy balls": String.raw`import pygame, random

pygame.init()

  "Arrow-key square": String.raw`# Click the canvas first so it gets keyboard focus!
import pygame

pygame.init()
screen = pygame.display.set_mode((640, 480))
clock = pygame.time.Clock()

x, y, size, speed = 320.0, 240.0, 36, 5
trail = []

while True:
    for event in pygame.event.get():
        if event.type == pygame.QUIT:
            raise SystemExit

    keys = pygame.key.get_pressed()
    if keys[pygame.K_LEFT]:  x -= speed
    if keys[pygame.K_RIGHT]: x += speed
    if keys[pygame.K_UP]:    y -= speed
    if keys[pygame.K_DOWN]:  y += speed
    x = max(size, min(640 - size, x))
    y = max(size, min(480 - size, y))

    trail.append((x, y))
    if len(trail) > 30:
        trail.pop(0)

    screen.fill((14, 16, 22))
    for i, (tx, ty) in enumerate(trail):
        s = int(size * i / len(trail))
        pygame.draw.rect(screen, (40 + 5 * i, 60, 90),
                         (tx - s / 2, ty - s / 2, s, s), border_radius=6)
    pygame.draw.rect(screen, (120, 220, 160),

  "Snake": String.raw`# Arrow keys to steer. R restarts after game over. (Click the canvas first!)
import pygame, random

CELL, COLS, ROWS = 20, 32, 24

def main():
    pygame.init()
    screen = pygame.display.set_mode((COLS * CELL, ROWS * CELL))
    clock = pygame.time.Clock()
    font = pygame.font.Font(None, 42)

    while True:  # one iteration per game
        snake = [(COLS // 2, ROWS // 2)]
        d = (1, 0)
        food = (random.randrange(COLS), random.randrange(ROWS))
        score, alive = 0, True

        while alive:
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    raise SystemExit
                if event.type == pygame.KEYDOWN:
                    if event.key == pygame.K_LEFT  and d != (1, 0):  d = (-1, 0)
                    if event.key == pygame.K_RIGHT and d != (-1, 0): d = (1, 0)
                    if event.key == pygame.K_UP    and d != (0, 1):  d = (0, -1)
                    if event.key == pygame.K_DOWN  and d != (0, -1): d = (0, 1)

            head = (snake[0][0] + d[0], snake[0][1] + d[1])
            if (head in snake or not (0 <= head[0] < COLS) or not (0 <= head[1] < ROWS)):
                alive = False
            else:
                snake.insert(0, head)
                if head == food:
                    score += 1
                    food = (random.randrange(COLS), random.randrange(ROWS))
                else:
                    snake.pop()

            screen.fill((15, 18, 15))
            fx, fy = food
            pygame.draw.rect(screen, (235, 90, 90), (fx * CELL + 2, fy * CELL + 2, CELL - 4, CELL - 4), border_radius=6)
            for i, (sx, sy) in enumerate(snake):
                g = max(90, 210 - i * 6)
                pygame.draw.rect(screen, (70, g, 90), (sx * CELL + 1, sy * CELL + 1, CELL - 2, CELL - 2), border_radius=4)
            img = font.render(str(score), True, (200, 210, 200))
            screen.blit(img, (10, 6))
            pygame.display.flip()
            clock.tick(9 + score // 3)

        # game over screen
        img = font.render(f"Game over — {score} points. Press R", True, (240, 220, 180))
        screen.blit(img, img.get_rect(center=(COLS * CELL // 2, ROWS * CELL // 2)))
        pygame.display.flip()
        waiting = True
        while waiting:
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    raise SystemExit
                if event.type == pygame.KEYDOWN and event.key == pygame.K_r:
                    waiting = False
            clock.tick(30)

main()
`,

const BOOT_PY = String.raw`
import os, ast, asyncio, traceback, copy, time as _time

import pygame

_state = {"task": None, "delay": 0.0, "flipped": False, "ticked": False, "n": 0}

def _flag_flip(fn):
    def wrapper(*a, **k):
        _state["flipped"] = True
        return fn(*a, **k)
    return wrapper

pygame.display.flip = _flag_flip(pygame.display.flip)
pygame.display.update = _flag_flip(pygame.display.update)

class _Clock:
    """tick() never busy-waits: it banks the frame budget, which the injected
    loop yield sleeps off cooperatively."""
    def __init__(self):
        self._last = pygame.time.get_ticks()
        self._dt = 0
    def tick(self, fps=0):
        now = pygame.time.get_ticks()
        self._dt, self._last = now - self._last, now
        _state["ticked"] = True
        if fps:
            _state["delay"] = max(0.0, 1.0 / fps - self._dt / 1000.0)
        return self._dt
    tick_busy_loop = tick
    def get_time(self): return self._dt
    get_rawtime = get_time
    def get_fps(self): return 1000.0 / self._dt if self._dt else 0.0
pygame.time.Clock = _Clock

# Pyodide's time.sleep busy-waits the browser main thread. Statement-level
# sleeps become real awaits via _Awaiter below; banking is the no-freeze
# fallback for sleeps buried in sync helper functions.
def _bank(secs):
    try:
        _state["delay"] += max(0.0, float(secs))
    except Exception:
        pass

def _wait_ms(ms):
    _bank(ms / 1000.0)
    return int(ms)

pygame.time.delay = pygame.time.wait = _wait_ms
_time.sleep = _bank

async def __sleep__(secs):
    try:
        secs = max(0.0, float(secs))
    except Exception:
        secs = 0.0
    await asyncio.sleep(secs)

async def __yield__():
    d, ticked, flipped = _state["delay"], _state["ticked"], _state["flipped"]
    _state.update(delay=0.0, ticked=False, flipped=False)
    if d > 0:
        await asyncio.sleep(d)
    elif ticked:
        await asyncio.sleep(0)
    elif flipped:
        await asyncio.sleep(1 / 60)       # flip but no tick: default to ~60fps
    else:
        _state["n"] += 1
        if _state["n"] % 256 == 0:        # plain compute loop: yield occasionally
            await asyncio.sleep(0)

# ---- source transform: plain pygame code -> cooperative async ----

_YIELD = ast.parse("await __yield__()").body[0]

def _shallow(node):
    """Walk child nodes without crossing into nested function/class scopes."""
    stack = list(ast.iter_child_nodes(node))
    while stack:
        n = stack.pop()
        yield n
        if not isinstance(n, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
            stack.extend(ast.iter_child_nodes(n))

def _is_gameloop(loop):
    for n in _shallow(loop):
        if isinstance(n, ast.Call) and isinstance(n.func, ast.Attribute):
            f = n.func
            owner = f.value.attr if isinstance(f.value, ast.Attribute) else None
            if (f.attr in ("flip", "tick", "tick_busy_loop")
                    or (f.attr, owner) == ("update", "display")
                    or (f.attr in ("get", "poll", "wait") and owner == "event")):
                return True
    return False

def _time_names(tree):
    """Names the user's code binds to the time module / time.sleep."""
    mods, sleeps = set(), set()
    for n in ast.walk(tree):
        if isinstance(n, ast.Import):
            mods.update(a.asname or "time" for a in n.names if a.name == "time")
        elif isinstance(n, ast.ImportFrom) and n.module == "time":
            sleeps.update(a.asname or "sleep" for a in n.names if a.name == "sleep")
    return mods, sleeps

class _SyncBarrier(ast.NodeTransformer):
    """Base for the passes below: never descend into sync defs or classes,
    where an inserted await would be a syntax error."""
    def visit_FunctionDef(self, node): return node
    def visit_ClassDef(self, node): return node

class _Asyncify(_SyncBarrier):
    """def f(): while ...flip()...  ->  async def f(), remembering names."""
    def __init__(self):
        self.converted = set()
    def visit_FunctionDef(self, node):
        if any(isinstance(n, ast.While) and _is_gameloop(n) for n in _shallow(node)):
            node.__class__ = ast.AsyncFunctionDef
            self.converted.add(node.name)
        return node

class _Awaiter(_SyncBarrier):
    """Statement-level rewrites in async contexts:
       main()                        -> await main()      (converted functions)
       asyncio.run(x)                -> await x
       time.sleep(s)                 -> await __sleep__(s)
       pygame.time.wait|delay(ms)    -> await __sleep__(ms / 1000)"""
    def __init__(self, converted, time_mods, sleep_names):
        self.converted, self.time_mods, self.sleep_names = converted, time_mods, sleep_names
    @staticmethod
    def _sleep(secs):
        return ast.Call(func=ast.Name("__sleep__", ast.Load()), args=[secs], keywords=[])
    def visit_Expr(self, node):
        self.generic_visit(node)
        v = node.value
        if not isinstance(v, ast.Call):
            return node
        f, simple = v.func, len(v.args) == 1 and not v.keywords
        target = None
        if isinstance(f, ast.Name):
            if f.id in self.converted:
                target = v
            elif simple and f.id in self.sleep_names:
                target = self._sleep(v.args[0])
        elif isinstance(f, ast.Attribute):
            owner = f.value
            if f.attr == "run" and isinstance(owner, ast.Name) and owner.id == "asyncio" and v.args:
                target = v.args[0]
            elif simple and f.attr == "sleep" and isinstance(owner, ast.Name) and owner.id in self.time_mods:
                target = self._sleep(v.args[0])
            elif simple and f.attr in ("wait", "delay") and isinstance(owner, ast.Attribute) and owner.attr == "time":
                target = self._sleep(ast.BinOp(left=v.args[0], op=ast.Div(), right=ast.Constant(1000.0)))
        if target is not None:
            node.value = ast.copy_location(ast.Await(value=target), v)
        return node

class _InjectYield(_SyncBarrier):
    """Append 'await __yield__()' to every while-body in async contexts."""
    def visit_While(self, node):
        self.generic_visit(node)
        node.body.append(copy.deepcopy(_YIELD))
        return node

def _transform(src):
    tree = ast.parse(src)
    asyncify = _Asyncify()
    tree = asyncify.visit(tree)
    tree = _Awaiter(asyncify.converted, *_time_names(tree)).visit(tree)
    tree = _InjectYield().visit(tree)
    ast.fix_missing_locations(tree)
    return compile(tree, "<your code>", "exec", flags=ast.PyCF_ALLOW_TOP_LEVEL_AWAIT)

# ---- run management ----

async def _run(src):
    glb = {"__name__": "__main__", "__yield__": __yield__, "__sleep__": __sleep__,
           "__builtins__": __builtins__}
    try:
        code = _transform(src)
    except SyntaxError:
        traceback.print_exc(limit=0)
        return "error"
    try:
        if pygame.get_init():
            pygame.event.clear()
        res = eval(code, glb)
        if asyncio.iscoroutine(res):
            await res
        return "ok"
    except asyncio.CancelledError:
        return "stopped"
    except SystemExit:
        return "exit"
    except BaseException:
        traceback.print_exc()
        return "error"

def _start(src):
    _stop()
    _state.update(delay=0.0, flipped=False, ticked=False, n=0)
    _state["task"] = asyncio.ensure_future(_run(src))
    return _state["task"]

def _stop():
    t = _state["task"]
    if t and not t.done():
        t.cancel()
        return True
    return False
`;

// ---------------------------------------------------------------- assets (uploadable sprites & sounds)
// Bytes live in IndexedDB (assetStore) and are mirrored into Pyodide's MEMFS
// (assetFS) so plain pygame code resolves them by name. Lazy + additive: the
// solo path touches none of this. See docs/specs/2026-06-22-assets-sprites-sound-design.md
const ASSET_MAX_FILE = 10 * 1024 * 1024;   // 10 MB per file
const ASSET_MAX_TOTAL = 64 * 1024 * 1024;  // 64 MB total
const UNSUPPORTED_AUDIO = /\.(mp3|m4a|aac|flac|wma)$/i;  // SDL_mixer here decodes only WAV/OGG

const assetStore = {
  _db: null,
  _open() {
    return this._db ??= new Promise((resolve, reject) => {
      const r = indexedDB.open('pygame-playground', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('assets', { keyPath: 'name' });
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  },
  async _tx(mode, fn) {
    const db = await this._open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('assets', mode);
      const out = fn(tx.objectStore('assets'));
      tx.oncomplete = () => resolve(out);
      tx.onerror = () => reject(tx.error);
    });
  },
  async getAll() { try { return await this._tx('readonly', s => { const rq = s.getAll(); return new Promise(r => rq.onsuccess = () => r(rq.result)); }); } catch { return []; } },
  async put(rec) { try { await this._tx('readwrite', s => s.put(rec)); return true; } catch { return false; } },
  async remove(name) { try { await this._tx('readwrite', s => s.delete(name)); } catch {} },
  async clear() { try { await this._tx('readwrite', s => s.clear()); } catch {} },
};

const assetFS = {
  list: [],   // [{name, size, type, warn}]
  _memfs(name, bytes) { if (pyodide) try { pyodide.FS.writeFile(name, bytes); } catch (e) { console.warn('memfs write', name, e); } },
  _unlink(name) { if (pyodide) try { if (pyodide.FS.analyzePath(name).exists) pyodide.FS.unlink(name); } catch {} },
  async hydrateAll() {
    const recs = await assetStore.getAll();
    this.list = recs.map(r => ({ name: r.name, size: r.size, type: r.type, warn: UNSUPPORTED_AUDIO.test(r.name) }));
    for (const r of recs) this._memfs(r.name, new Uint8Array(r.bytes));
    renderAssets();
  },
  totalSize() { return this.list.reduce((n, a) => n + a.size, 0); },
  async add(file) {
    if (file.size > ASSET_MAX_FILE) return assetMsg(`"${file.name}" is ${(file.size/1048576).toFixed(1)} MB — over the 10 MB per-file limit.`);
    const existing = this.list.find(a => a.name === file.name);
    if (this.totalSize() - (existing?.size || 0) + file.size > ASSET_MAX_TOTAL)
      return assetMsg(`Adding "${file.name}" would exceed the 64 MB total budget. Remove something first.`);
    const bytes = new Uint8Array(await file.arrayBuffer());
    const saved = await assetStore.put({ name: file.name, bytes: bytes.buffer, type: file.type, size: bytes.length, addedAt: Date.now() });
    if (!saved) assetMsg(`Couldn't save "${file.name}" to persist for next time (storage full or unavailable) — it'll work this session only.`);
    this._memfs(file.name, bytes);
    this.list = this.list.filter(a => a.name !== file.name);
    this.list.push({ name: file.name, size: bytes.length, type: file.type, warn: UNSUPPORTED_AUDIO.test(file.name) });
    renderAssets();
  },
  async remove(name) {
    await assetStore.remove(name); this._unlink(name);
    this.list = this.list.filter(a => a.name !== name); renderAssets();
  },
  async clearAll() {
    await assetStore.clear();
    for (const a of this.list) this._unlink(a.name);
    this.list = []; renderAssets();
  },
  async addFiles(files) { for (const f of files) await this.add(f); },
};

const stageEl = document.getElementById("stage");

// Scale the canvas to fill the stage, preserving the pygame resolution's aspect ratio.
function fitCanvas() {
  const cs = getComputedStyle(stageEl);
  const availW = stageEl.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const availH = stageEl.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  const cw = canvasEl.width, ch = canvasEl.height;
  if (cw > 0 && ch > 0 && availW > 0 && availH > 0) {
    const scale = Math.min(availW / cw, availH / ch);
    canvasEl.style.width = cw * scale + "px";
    canvasEl.style.height = ch * scale + "px";
  }
}
new ResizeObserver(fitCanvas).observe(stageEl);
// pygame.display.set_mode() rewrites the canvas width/height attributes — refit when it does.
new MutationObserver(fitCanvas).observe(canvasEl, { attributes: true, attributeFilter: ["width", "height"] });
fitCanvas();

// Draggable dividers. makeSplitter handles the pointer-capture/cursor boilerplate;
// onMove does the axis-specific sizing, onDone runs once on release.
function makeSplitter(el, axis, onMove, onDone) {
  el.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    el.classList.add("active");
    document.body.classList.add("resizing-" + axis);
    const move = (ev) => onMove(ev);
    const up = () => {
      el.classList.remove("active");
      document.body.classList.remove("resizing-" + axis);
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      onDone?.();
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
  });
}

// ---------------------------------------------------------------- pyodide boot
const PYODIDE_BASE = "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/";
let pyodide = null;
let runTask = null;

async function boot() {
  // Capture SDL's Web Audio context(s) so the Run click (a user gesture) can resume
  // them — headed browsers start an AudioContext suspended until a gesture. Inert
  // unless the user's program calls pygame.mixer. (Proxy returns real instances.)
  window.__audioContexts = window.__audioContexts || [];
  for (const key of ["AudioContext", "webkitAudioContext"]) {
    const Orig = window[key];
    if (!Orig || Orig.__wrapped) continue;
    const Wrapped = new Proxy(Orig, { construct(T, a) { const c = new T(...a); window.__audioContexts.push(c); return c; } });
    Wrapped.__wrapped = true;
    window[key] = Wrapped;
  }
  setStatus("boot", "loading Python…");
  const mod = await import(PYODIDE_BASE + "pyodide.mjs");
  pyodide = await mod.loadPyodide({ indexURL: PYODIDE_BASE });
  pyodide.setStdout({ batched: (s) => logLine(s, "out") });
  pyodide.setStderr({ batched: (s) => logLine(s, "err") });
  // Register the canvas with SDL BEFORE pygame is imported (load-bearing order),
  // and scope SDL's keyboard capture to the canvas so the editor keeps working.
  if (pyodide.canvas && pyodide.canvas.setCanvas2D) {
    pyodide.canvas.setCanvas2D(canvasEl);
  } else {
    pyodide._module.canvas = canvasEl;
  }
  pyodide.runPython(
    'import os; os.environ["SDL_EMSCRIPTEN_KEYBOARD_ELEMENT"] = "#canvas"');
  setStatus("boot", "loading pygame…");
  await pyodide.loadPackage("pygame-ce");
  await pyodide.runPythonAsync(BOOT_PY);
  await assetFS.hydrateAll();   // rehydrate any persisted uploads into MEMFS
  setStatus("ready", "ready");
}
const booted = boot().catch((e) => {
  setStatus("error", "boot failed");
  logLine(String(e), "err");
  throw e;
});

// ---------------------------------------------------------------- run / stop
async function run() {
  try { await booted; } catch { return; }
  clearConsole();
  canvasEl.focus();
  resumeAudio();
  const start = pyodide.globals.get("_start");
  const task = start(editor.getValue());
  start.destroy();
  runTask = task;
  setStatus("running", "running");
  task.then((kind) => {
    if (runTask !== task) return;
    if (kind === "error") return setStatus("error", "error — see console");
    setStatus("ready", kind === "stopped" ? "stopped" : "finished");
    logLine(kind === "stopped" ? "— stopped —" : "— program finished —", "sys");
  }).catch(() => {
    if (runTask === task) setStatus("ready", "stopped");
  });
}

// Resume any SDL-created Web Audio context on a user gesture (autoplay policy).
function resumeAudio() {
  for (const c of window.__audioContexts || []) {
    if (c.state === "suspended") c.resume().catch(() => {});
  }
}
canvasEl.addEventListener("click", resumeAudio);

document.getElementById("runBtn").addEventListener("click", run);
document.getElementById("stopBtn").addEventListener("click", () => {
  if (pyodide) pyodide.runPython("_stop()");
});

// ---------------------------------------------------------------- collaboration (lazy)
async function loadAutomerge() {
  if (_amCache) return _amCache;
  // relative (not "/vendor/…") so it resolves under the GitHub Pages project subpath, not the domain root
  const AM = await import(new URL("./vendor/automerge-collab.mjs", document.baseURI).href);
  if (AM.ensureReady) await AM.ensureReady();                 // no-op for current bundle; future-proof
  _amCache = { Repo: AM.Repo, Presence: AM.Presence,
               WebSocketClientAdapter: AM.WebSocketClientAdapter, updateText: AM.updateText };
  window.__amLoaded = true;   // sentinel for tests
  return _amCache;
}

function setLive(state, peers) {
  const dot = document.getElementById("liveDot");
  dot.hidden = !collab.active;
  dot.className = state;                 // '', 'connecting', 'offline'
  document.getElementById("peerCount").textContent = peers ?? 1;
}

function applyingRemoteSet(fn) { collab.applyingRemote = true; try { fn(); } finally { collab.applyingRemote = false; } }
function bindEditor() {
  const { updateText } = collab.lib;
  // local edits -> shared doc
  editor.on("change", () => {
    if (!collab.active || collab.applyingRemote) return;
    const value = editor.getValue();
    if (value === collab.handle.doc().code) return;
    collab.handle.change(d => updateText(d, ["code"], value));
  });
  // shared doc -> local editor: replaceRange only the changed middle, preserving cursor/scroll
  collab.handle.on("change", ({ doc }) => {
    const next = doc.code ?? "";
    const cur = editor.getValue();
    if (next === cur) return;
    applyingRemoteSet(() => {
      let s = 0;
      while (s < cur.length && s < next.length && cur[s] === next[s]) s++;
      let e = 0;
      while (e < cur.length - s && e < next.length - s &&
             cur[cur.length - 1 - e] === next[next.length - 1 - e]) e++;
      const from = editor.posFromIndex(s);
      const to = editor.posFromIndex(cur.length - e);
      editor.replaceRange(next.slice(s, next.length - e), from, to, "+remote");
    });
  });
}
const NAME_ADJ = ["Swift", "Brave", "Clever", "Sly", "Jolly", "Witty", "Cosmic", "Mellow",
  "Plucky", "Zesty", "Nimble", "Cheery", "Snazzy", "Bouncy", "Dapper", "Breezy", "Sunny", "Funky"];
const NAME_ANIMAL = ["Otter", "Panda", "Fox", "Heron", "Lynx", "Gecko", "Wombat", "Tapir",
  "Narwhal", "Puffin", "Koala", "Badger", "Quokka", "Axolotl", "Ferret", "Pangolin", "Manatee", "Stoat"];
const pickFrom = (a) => a[Math.floor(Math.random() * a.length)];
const before = (a, b) => a.line < b.line || (a.line === b.line && a.ch <= b.ch);   // a <= b in doc order

function startPresence() {
  const me = { name: pickFrom(NAME_ADJ) + " " + pickFrom(NAME_ANIMAL),
               color: "hsl(" + Math.floor(Math.random() * 360) + ",70%,60%)" };
  collab.presence = new collab.lib.Presence({ handle: collab.handle });
  collab.presence.start({ initialState: { cursor: { line: 0, ch: 0 }, user: me },
                          heartbeatMs: 5000, peerTtlMs: 60000 });
  editor.on("cursorActivity", () => {
    const head = editor.getCursor("head"), anchor = editor.getCursor("anchor");
    collab.presence.broadcast("cursor", {
      line: head.line, ch: head.ch, anchor: { line: anchor.line, ch: anchor.ch },
    });
  });
  collab.markers = [];
  // In this bundle getPeerStates() returns a PeerStateView whose .value is
  // { [peerId]: { peerId, value: { cursor, user, ... } } } — no .peers() method.
  const renderPeers = () => {
    const peers = Object.values(collab.presence.getPeerStates().value);
    setLive("", peers.length + 1);
    collab.markers.forEach(m => m.clear());
    collab.markers = peers.flatMap(p => {
      const cur = p.value?.cursor;
      if (!cur) return [];
      const color = p.value.user?.color || "#fff";
      const marks = [];
      // shared highlight: render the peer's selection as a translucent band in their color
      const a = cur.anchor;
      if (a && (a.line !== cur.line || a.ch !== cur.ch)) {
        const [from, to] = before(a, cur) ? [a, cur] : [cur, a];
        marks.push(editor.markText(from, to,
          { css: "background-color:" + color.replace("hsl(", "hsla(").replace(")", ",0.25)") }));
      }
      // caret + name flag at the head
      const el = document.createElement("span");
      el.className = "remote-cursor";
      el.style.borderColor = color;
      const flag = document.createElement("span");
      flag.className = "remote-flag"; flag.textContent = p.value.user?.name || "peer";
      flag.style.background = color;
      el.appendChild(flag);
      marks.push(editor.setBookmark({ line: cur.line, ch: cur.ch }, { widget: el, insertLeft: true }));
      return marks;
    });
  };
  collab.presence.on("update", renderPeers);
  collab.presence.on("snapshot", renderPeers);
}

async function findWithRetry(lib, url, tries = 8, delayMs = 1000) {
  for (let i = 0; i < tries; i++) {
    // Create a fresh Repo each attempt: automerge-repo caches "unavailable" state
    // per Repo instance, so retrying against the same repo returns the cached miss.
    const repo = new lib.Repo({ network: [new lib.WebSocketClientAdapter("wss://sync.automerge.org")] });
    try {
      const h = await repo.find(url);
      // find() resolves to a ready DocHandle or rejects (unavailable/failed)
      if (h && !h.isUnavailable?.()) { collab.repo = repo; return h; }
    } catch (e) { /* relay propagation race — retry */ }
    try { await repo.shutdown?.(); } catch {}   // close this attempt's socket before retrying
    await new Promise(r => setTimeout(r, delayMs));
  }
  return null;
}

async function startRoom() {
  collab.lib = await loadAutomerge();
  collab.repo = new collab.lib.Repo({ network: [new collab.lib.WebSocketClientAdapter("wss://sync.automerge.org")] });
  collab.handle = collab.repo.create({ code: editor.getValue() });
  await collab.handle.whenReady();
  location.hash = "#room=" + collab.handle.url;
  await enterRoom();
  copyRoomLink();
}

async function joinRoom(url) {
  collab.starting = true;                       // block a Collaborate click during the join
  try {
    collab.lib = await loadAutomerge();
    // findWithRetry creates fresh Repo instances per attempt and assigns collab.repo on success
    collab.handle = await findWithRetry(collab.lib, url);
    if (!collab.handle) { console.warn("Room not found or unavailable; staying solo."); setLive("offline", 1); return; }
    applyingRemoteSet(() => editor.setValue(collab.handle.doc().code ?? ""));
    await enterRoom();
  } finally {
    collab.starting = false;
  }
}

async function enterRoom() {
  collab.active = true;
  setLive("", 1);
  document.getElementById("collabBtn").textContent = "🔗 Copy room link";
  if (!collab.bound) { collab.bound = true; bindEditor(); startPresence(); }  // attach listeners once
}

function copyRoomLink() {
  const url = location.origin + location.pathname + location.hash;
  navigator.clipboard?.writeText(url).then(() => flashBtn("✓ link copied"), () => flashBtn("✓ link in URL bar"));
}
function flashBtn(text) {
  const b = document.getElementById("collabBtn"); b.textContent = text;
  setTimeout(() => { b.textContent = "🔗 Copy room link"; }, 1500);
}

document.getElementById("collabBtn").addEventListener("click", () => {
  if (collab.active) return copyRoomLink();
  if (collab.starting) return;                 // ignore re-entrant clicks while a room is being set up
  collab.starting = true;
  setLive("connecting", 1);
  startRoom().catch((e) => { console.error(e); setLive("offline", 1); })
             .finally(() => { collab.starting = false; });
});

addEventListener("offline", () => { if (collab.active) setLive("offline", document.getElementById("peerCount").textContent); });
addEventListener("online",  () => { if (collab.active) setLive("", document.getElementById("peerCount").textContent); });

// Run the default example as soon as Python is up.
booted.then(run).catch(() => {});
</script>
