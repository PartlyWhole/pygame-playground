<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pygame playground</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<style>
  :root {
    /* ── physical raws (unchanged, load-bearing) ── */
    --bg: #14151a; --panel: #1c1e26; --edge: #2c2f3a;
    --text: #d8dae5; --dim: #8a8fa3; --accent: #7bd88f; --warn: #f0a45d; --bad: #ff6e7f;
    /* ── semantic surfaces / control tints (S1 shell) ── */
    --color-surface-pill: #20222c; --color-surface-control: #262936;
    --color-surface-sunken: #121318; --color-surface-stage: #0e0f13;
    --color-border-hover: #4a4f63;
    --color-tint-run-bg: #234430; --color-tint-run-bg-hover: #2b5a3d;
    --color-tint-run-border: #2f6a44; --color-tint-run-border-strong: #2f6a44;
    --color-text-on-tint: #b8f0c6; --color-text-on-bad: #f3b0ba;
    /* ── rail ── */
    --color-rail-bg: #181a21; --color-rail-item-hover: #23262f;
    --color-rail-item-active: rgba(123,216,143,.12); --color-rail-item-active-bar: var(--accent);
    --color-rail-icon: var(--dim); --color-rail-icon-active: var(--accent);
    /* ── tooltip ── */
    --color-tooltip-bg: var(--panel); --color-tooltip-text: var(--text);
    --color-tooltip-border: var(--edge); --shadow-tooltip: 0 6px 18px rgba(0,0,0,.4);
    /* ── status paused (S3): distinct "held" amber, not running-green ── */
    --color-status-paused: var(--warn);
    /* ── pane chrome ── */
    --color-pane-head-bg: var(--panel); --color-pane-head-text: var(--dim);
    --color-pane-name: var(--text); --color-chev-hover: #23262f;
    /* ── tree row extensions ── */
    --color-row-hover: #23262f; --color-row-selected: #23303a;
    --color-row-selected-text: #cdeccf; --color-py-icon: #6fb3e0;
    --mono: "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  /* `.btn`/`.chev-btn`/`.stage-hint` set display, which would otherwise beat the `hidden` attribute.
     S3: Pause/End/run-badge are shown only while a task is live (toggled via the `hidden` attr in JS);
     #stopBtn (End ✕) is the kept click target — present + clickable while live, hidden when idle. */
  #pauseBtn[hidden], #stopBtn[hidden], #runFileBadge[hidden], #newFolderBtn[hidden] { display: none !important; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; overflow: hidden;
  }
  button { font: inherit; }
  .mono { font-family: var(--mono); }

  /* ---------- buttons ---------- */
  .btn {
    background: var(--color-surface-control); color: var(--text); border: 1px solid var(--edge);
    border-radius: 6px; padding: 5px 12px; cursor: pointer; display: inline-flex;
    align-items: center; gap: 6px; line-height: 1; transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #2e3140; border-color: var(--color-border-hover); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .btn.primary { background: var(--color-tint-run-bg); border-color: var(--color-tint-run-border-strong); color: var(--color-text-on-tint); font-weight: 600; }
  .btn.primary:hover { background: var(--color-tint-run-bg-hover); }
  .btn.stop { color: var(--bad); font-weight: 600; }
  .btn.stop:hover { background: #3a2329; border-color: #6a2f38; }
  /* Generic disabled-button look (no element uses it for the run model — Start RESTARTS while live). */
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  /* S3: running-file badge — warm, clickable. */
  #runFileBadge { cursor: pointer; color: var(--warn); }
  #runFileBadge:hover { text-decoration: underline; }
  .ghost { background: none; border: 0; color: var(--dim); cursor: pointer; font-size: 12px; padding: 4px; border-radius: 5px; display: inline-flex; align-items: center; gap: 4px; }
  .ghost:hover { color: var(--text); background: var(--color-row-hover); }
  .ghost:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .ghost svg { display: block; }
  .chev-btn { background: none; border: 0; color: var(--dim); cursor: pointer; font-size: 13px; padding: 2px 5px; border-radius: 4px; }
  .chev-btn:hover { color: var(--text); background: var(--color-chev-hover); }
  .chev-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* ---------- toolbar ---------- */
  .toolbar {
    display: flex; align-items: center; gap: 10px; height: 46px; flex: 0 0 auto;
    padding: 0 12px; background: var(--panel); border-bottom: 1px solid var(--edge);
  }
  .title { font-weight: 600; font-size: 15px; white-space: nowrap; margin: 0; }
  .title span { color: var(--accent); }
  .spacer { flex: 1; }
  .pill {
    padding: 4px 10px; border-radius: 99px; background: var(--color-surface-pill); border: 1px solid var(--edge);
    color: var(--dim); font-size: 12.5px; white-space: nowrap;
  }
  .pill.running { color: var(--accent); border-color: var(--color-tint-run-border-strong); }
  .pill.error { color: var(--bad); }
  .pill.boot { color: var(--warn); }
  .pill.paused { color: var(--color-status-paused); }   /* reserved placeholder; never emitted in S1 */
  .hint { color: var(--dim); font-size: 12px; }
  @media (max-width: 1000px) { .hint { display: none; } }

  /* ---------- main grid ---------- */
  .main { flex: 1; min-height: 0; display: flex; }

  /* ---------- rail ---------- */
  .rail { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 0 0 48px;
          background: var(--color-rail-bg); border-right: 1px solid var(--edge); padding: 8px 0; }
  .acttab {
    width: 38px; height: 38px; background: none; border: 0; border-radius: 8px; position: relative;
    color: var(--color-rail-icon); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s;
  }
  .acttab svg { width: 20px; height: 20px; display: block; }
  .acttab:hover { color: var(--text); background: var(--color-rail-item-hover); }
  .acttab.active { color: var(--color-rail-icon-active); background: var(--color-rail-item-active); }
  .acttab.active::before { content: ""; position: absolute; left: -5px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 22px; border-radius: 0 2px 2px 0; background: var(--color-rail-item-active-bar); }
  .acttab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- shared tooltip ---------- */
  .tooltip {
    position: fixed; left: 0; top: 0; z-index: 300; background: var(--color-tooltip-bg); color: var(--color-tooltip-text);
    border: 1px solid var(--color-tooltip-border); border-radius: 6px; padding: 3px 8px; font-size: 11px; line-height: 1.3;
    white-space: nowrap; pointer-events: none; box-shadow: var(--shadow-tooltip);
    opacity: 0; visibility: hidden; transform: translateY(-3px); transition: opacity .12s, transform .12s;
  }
  .tooltip.show { opacity: 1; visibility: visible; transform: translateY(0); }

  /* ---------- side panel ---------- */
  .side {
    flex: 0 0 250px; width: 250px; background: var(--panel); border-right: 1px solid var(--edge);
    display: flex; flex-direction: column; min-height: 0; min-width: 0;
  }
  .side.collapsed { display: none; }
  .side-head {
    display: flex; align-items: center; justify-content: space-between; gap: 6px; min-height: 33px;
    padding: 3px 5px 3px 11px; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
  }
  .side-head .acts { display: flex; gap: 1px; margin-left: auto; }
  .panelview { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .panelview[hidden] { display: none; }
  .side-body { flex: 1; overflow: auto; min-height: 0; padding: 2px 6px 8px; }
  .panel-note { color: var(--dim); font-size: 11px; padding: 6px 10px 4px; font-style: italic; }

  /* ---------- explorer tree (#tabs) — flat list, rows keep .tab[data-name] seam ---------- */
  .tree { padding: 4px 4px; display: block; }
  #tabs .tab {
    display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 5px; cursor: pointer;
    position: relative; border-left: 2px solid transparent; color: var(--dim); font-size: 13px; white-space: nowrap;
  }
  #tabs .tab:hover { background: var(--color-row-hover); color: var(--text); }
  #tabs .tab.active { background: var(--color-row-selected); border-left-color: var(--accent); color: var(--color-row-selected-text); }
  #tabs .tab .ic { width: 16px; flex: 0 0 16px; text-align: center; font-size: 13px; }
  #tabs .tab.py .ic { color: var(--color-py-icon); }
  #tabs .tab .tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0; font-family: var(--mono); font-size: 12px; }
  /* S3: the file whose program is live gets a warm left-bar + warm name (the at-a-glance running cue),
     distinct from .active selection. Slice C dropped the redundant in-row ▶ — the stage #runFileBadge
     stays the authoritative "what's running"; running shows here via border + warm name only. */
  #tabs .tab.running { border-left-color: var(--warn); }
  #tabs .tab.running .tab-name { color: var(--warn); }
  #tabs .tab .moddot { color: var(--accent); font-size: 10px; flex: 0 0 auto; margin-right: 2px; }
  #tabs .tab .asset-warn { color: var(--warn); flex: 0 0 auto; font-size: 12px; cursor: help; }
  #tabs .tab .tab-menu { color: var(--dim); border: none; background: none; cursor: pointer; font-size: 12px; padding: 0 3px; border-radius: 3px; }
  #tabs .tab .tab-menu:hover { color: var(--text); background: #34384a; }
  /* Slice B: inline-rename input (replaces the row name span while editing). */
  #tabs .tab .rename-input {
    flex: 1; min-width: 0; font-family: var(--mono); font-size: 12px; color: var(--text);
    background: var(--bg); border: 1px solid var(--accent); border-radius: 3px; padding: 1px 4px; outline: none;
  }
  #tabs .tab .rename-input.invalid { border-color: var(--bad); }
  #tabs .tab .rename-hint { color: var(--bad); font-size: 10px; flex: 0 0 auto; margin-left: 4px; white-space: nowrap; }

  /* ---------- Slice B: popup action menu (one shared instance, anchored to a row's ⋯) ---------- */
  .popmenu {
    position: absolute; z-index: 60; min-width: 168px; padding: 4px;
    background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
    box-shadow: var(--shadow-tooltip); display: none; flex-direction: column;
  }
  .popmenu.open { display: flex; }
  @media (prefers-reduced-motion: no-preference) {
    .popmenu.open { animation: popmenu-in .1s ease-out; }
  }
  @keyframes popmenu-in { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
  .popmenu .mi {
    display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: none; border: 0; border-radius: 5px; cursor: pointer;
    color: var(--text); font-size: 13px; padding: 6px 10px; line-height: 1.2;
  }
  .popmenu .mi .mi-ic { width: 15px; flex: 0 0 15px; text-align: center; color: var(--dim); font-size: 12px; }
  .popmenu .mi:hover, .popmenu .mi:focus, .popmenu .mi.active { background: var(--color-row-hover); outline: none; }
  .popmenu .mi.danger { color: var(--bad); }
  .popmenu .mi.danger:hover, .popmenu .mi.danger:focus, .popmenu .mi.danger.active { background: #3a2329; }
  /* S2: folder rows + caret + DnD drop affordances (retargeted from proto/sandbox.html) */
  #tabs .tab .caret { width: 12px; flex: 0 0 12px; text-align: center; color: var(--dim); font-size: 9px; transition: transform .12s; }
  #tabs .tab .caret.spacer { visibility: hidden; }
  #tabs .tab.folder.open > .caret { transform: rotate(90deg); }
  #tabs .tab.folder .ic { color: var(--dim); }
  #tabs .tab.drop-into { background: #26402f; box-shadow: inset 0 0 0 1px var(--accent); }
  #tabs .tab.drag-ghost { opacity: .4; }
  #tabs .drop-line { height: 2px; background: var(--accent); margin: 0 6px; border-radius: 1px; }

  /* ---------- explorer asset-row warn badge (assets now live as #tabs .tab.asset rows) ---------- */
  #tabs .tab.asset .asset-warn { color: var(--warn); cursor: help; }
  /* ---------- explorer tree footer (browser-storage metric — moved out of the retired #apStorage) ---------- */
  #treeFoot { color: var(--dim); font-size: 11.5px; padding: 8px 6px 2px; margin-top: 4px; border-top: 1px solid var(--edge); }
  #treeFoot.low { color: var(--warn); }
  #treeFoot:empty { display: none; }

  /* ---------- examples rail panel (S4: editable, promote-on-edit) ---------- */
  #examplesPanel .exrow { display: flex; align-items: center; gap: 7px; padding: 5px 8px; border-radius: 5px; border-left: 2px solid transparent; color: var(--text); cursor: pointer; }
  #examplesPanel .exrow:hover { background: var(--color-row-hover); }
  #examplesPanel .exrow.sel { background: var(--color-row-selected); border-left-color: var(--accent); }
  #examplesPanel .exrow .ic { width: 16px; flex: 0 0 16px; text-align: center; color: var(--color-py-icon); }
  #examplesPanel .exrow .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #examplesPanel .exrow .moddot { color: var(--accent); font-size: 10px; flex: 0 0 auto; }
  #examplesPanel .exrow .reset { background: none; border: 0; color: var(--dim); cursor: pointer; font-size: 13px; padding: 0 3px; border-radius: 3px; flex: 0 0 auto; opacity: 0; }
  #examplesPanel .exrow:hover .reset { opacity: 1; }
  #examplesPanel .exrow .reset:hover { color: var(--accent); background: var(--color-border-hover); }

  /* ---------- history rail panel (#historyPanel — in-flow) ---------- */
  #historyPanel { font-size: 12.5px; }
  #historyPanel .hp-head { display: flex; justify-content: space-between; color: var(--dim); margin: 4px; }
  #historyPanel .hp-clear { color: var(--bad); cursor: pointer; }
  #historyPanel .hist-rows { display: flex; flex-direction: column; }
  #historyPanel .hist-row { display: flex; justify-content: space-between; gap: 8px; padding: 6px;
                            border-radius: 6px; cursor: pointer; border: 1px solid var(--edge); background: #191b22; margin: 0 4px 6px; }
  #historyPanel .hist-row:hover { border-color: var(--color-border-hover); background: #1d202a; }
  #historyPanel .hist-row.sel { background: var(--color-row-selected); box-shadow: inset 2px 0 0 var(--accent); }
  #historyPanel .hist-time { color: var(--text); }
  #historyPanel .hist-meta { color: var(--dim); font-family: var(--mono); font-size: 11px; }
  #historyPanel .hp-empty { color: var(--dim); padding: 6px; }
  #historyPanel .hp-diff { margin: 4px; }
  #historyPanel .hp-difftitle { color: var(--dim); margin: 6px 0 4px; }
  #historyPanel .hp-diffbody { font: 11.5px/1.5 var(--mono); white-space: pre-wrap;
                               max-height: 30vh; overflow-y: auto; border: 1px solid var(--edge); border-radius: 4px; }
  #historyPanel .d-add { background: rgba(123,216,143,.14); color: var(--color-text-on-tint); }
  #historyPanel .d-del { background: rgba(255,110,127,.14); color: var(--color-text-on-bad); }
  #historyPanel .d-ctx { color: var(--dim); }
  #historyPanel .hp-restore { margin: 8px 4px; background: var(--color-tint-run-bg); border-color: var(--color-tint-run-border-strong); color: var(--color-text-on-tint); border-radius: 6px; padding: 5px 12px; cursor: pointer; }

  /* ---------- collaboration rail panel ---------- */
  /* Off-screen-but-clickable engine seam (e.g. #collabBtn). Must stay in the layout and
     remain pointer-actionable for tests/delegates — do NOT use display:none/visibility:hidden. */
  .sr-seam { position: fixed; left: 2px; bottom: 2px; width: 1px; height: 1px; padding: 0; border: 0; overflow: hidden; opacity: .01; pointer-events: auto; z-index: 1; }
  #collabPanel { padding: 10px 12px; color: var(--dim); font-size: 13px; line-height: 1.5; }
  #liveDot { font-size: 12.5px; color: var(--accent); padding: 4px 8px; display: inline-block; margin-top: 8px; }
  #liveDot.connecting { color: var(--warn); }
  #liveDot.offline { color: var(--bad); }

  /* ---------- splitters ---------- */
  .split { flex: 0 0 6px; background: var(--edge); cursor: col-resize; transition: background .12s; z-index: 5; }
  .split:hover, .split.active { background: var(--accent); }
  .split.h { height: 6px; width: 100%; cursor: row-resize; flex: 0 0 6px; }
  body.resizing-x { cursor: col-resize; user-select: none; }
  body.resizing-y { cursor: row-resize; user-select: none; }

  /* ---------- right stack ---------- */
  .stack { flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
  .toprow { flex: 1; min-height: 0; display: flex; }
  .pane-head {
    display: flex; align-items: center; gap: 8px; height: 34px; flex: 0 0 auto; padding: 0 10px;
    background: var(--color-pane-head-bg); border-bottom: 1px solid var(--edge); color: var(--color-pane-head-text); font-size: 12px;
  }
  .pane-head .name { color: var(--color-pane-name); }
  .stage-hint { background: none; border: 0; color: var(--dim); font: inherit; font-size: 12px; padding: 0; cursor: default; }
  .pane-head .btn { padding: 3px 10px; font-size: 12px; }

  /* ---------- viewer (editor pane) ---------- */
  #editorPane { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; background: var(--bg); }
  .vbody { flex: 1; min-height: 0; overflow: auto; position: relative; display: flex; flex-direction: column; }
  .vbody.hide-cm .CodeMirror { display: none; }
  .CodeMirror { flex: 1; height: auto; font-size: 13.5px; min-height: 0; }
  /* image viewer */
  .imgview { flex: 1; min-height: 0; display: grid; place-items: center; gap: 14px; padding: 20px; overflow: auto; }
  .checker {
    padding: 12px; border-radius: 8px; border: 1px solid var(--edge); display: grid; place-items: center;
    background-image: linear-gradient(45deg,#23252e 25%,transparent 25%),linear-gradient(-45deg,#23252e 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#23252e 75%),linear-gradient(-45deg,transparent 75%,#23252e 75%);
    background-size: 20px 20px; background-position: 0 0,0 10px,10px -10px,-10px 0; background-color: #1a1c23;
  }
  .checker img { max-width: 320px; max-height: 320px; display: block; }
  .vcaption { color: var(--dim); font-size: 12px; text-align: center; }
  /* sound player */
  .sound { padding: 24px; display: flex; flex-direction: column; gap: 14px; align-items: center; justify-content: center; flex: 1; min-height: 0; }
  .playerbar { display: flex; align-items: center; gap: 12px; background: var(--panel); border: 1px solid var(--edge); border-radius: 10px; padding: 12px 16px; width: min(460px,90%); }
  .warnbanner { background: #2a2418; border: 1px solid #5a4a2a; color: var(--warn); border-radius: 8px; padding: 9px 12px; font-size: 12.5px; width: min(460px,90%); display: flex; gap: 8px; align-items: flex-start; }
  /* empty state */
  .empty { flex: 1; min-height: 0; display: grid; place-items: center; color: var(--dim); text-align: center; padding: 30px; font-size: 13px; }
  .empty .big { font-size: 28px; margin-bottom: 8px; opacity: .6; }

  /* ---------- stage ---------- */
  #rightPane { flex: 1 1 0; min-width: 280px; display: flex; flex-direction: column; min-height: 0; }
  #stage {
    flex: 1 1 0; min-height: 0; position: relative; display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: var(--color-surface-stage); padding: 12px;
  }
  /* SDL-bound canvas stays 640×480 (attributes); CSS only scales it down to fit (Risk-8). */
  #canvas { background: #000; outline: none; border-radius: 4px; box-shadow: 0 0 0 1px var(--edge); max-width: 100%; max-height: 100%; }
  #canvas:focus { box-shadow: 0 0 0 1px var(--accent); }

  /* ---------- console drawer ---------- */
  .drawer { flex: 0 0 170px; border-top: 1px solid var(--edge); background: var(--color-surface-sunken); display: flex; flex-direction: column; min-height: 0; }
  .drawer.collapsed { flex: 0 0 31px; }
  .drawer.collapsed #console { display: none; }
  .drawer-head {
    display: flex; align-items: center; gap: 8px; height: 30px; flex: 0 0 auto; padding: 0 10px;
    background: var(--color-pane-head-bg); border-bottom: 1px solid var(--edge); user-select: none;
  }
  .drawer.collapsed .drawer-head { border-bottom: 0; }
  .drawer-head .lbl { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }
  .drawer-head .fs-end { margin-left: auto; }
  .errbadge { background: #3a2024; border: 1px solid #5a2e36; color: var(--bad); border-radius: 99px; font-size: 11px; padding: 1px 8px; display: none; }
  .errbadge.show { display: inline-block; }
  #console {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    font: 12px/1.5 "SF Mono", Menlo, monospace; white-space: pre-wrap; min-height: 0;
  }
  #console .err { color: var(--bad); }
  #console .sys { color: var(--dim); font-style: italic; }

  /* ---------- collab remote cursors (unchanged) ---------- */
  .remote-cursor { position: relative; border-left: 2px solid; margin-left: -1px; }
  .remote-flag { position: absolute; top: -1.1em; left: -1px; font-size: 10px; padding: 0 3px;
                 white-space: nowrap; color: #0b0d12; border-radius: 3px 3px 3px 0; }

  kbd { background: var(--color-surface-control); border: 1px solid var(--edge); border-radius: 4px; padding: 0 5px; font-size: 11px; }

  /* ---------- drop overlay (unchanged) ---------- */
  #dropOverlay { position: fixed; inset: 0; z-index: 50; display: none; align-items: center;
                 justify-content: center; background: rgba(20,30,40,.78); color: var(--accent);
                 font-size: 22px; border: 3px dashed var(--accent); }
  #dropOverlay.show { display: flex; }
</style>
</head>
<body>

<!-- ===================== TOOLBAR (minimal) ===================== -->
<header class="toolbar">
  <h1 class="title">🐍 pygame <span>playground</span></h1>
  <span class="spacer"></span>
  <span id="status" class="pill boot" role="status" aria-live="polite">starting…</span>
  <!-- #collabBtn is the collaboration ENGINE SEAM (lazy Automerge, room create/join, copy-link).
       The locked battery test/collab.mjs (not reconciled) clicks '#collabBtn' DIRECTLY without first
       opening the Collab rail panel, so it must stay actionable while that panel is hidden — it can't

<script>
// ---------------------------------------------------------------- examples
const EXAMPLES = {
  "Swimming fish": String.raw`# Procedural fish, after argonaut's "A simple procedural animation technique"
# https://www.youtube.com/watch?v=qlfh_rv6khY
# A chain of joints trails the head; the body is drawn around the chain.
# Move the mouse over the canvas and the fish follow it.
import pygame, math, random

W, H = 640, 480
S = 0.26                                  # fish scale
TAU = math.tau

pygame.init()
screen = pygame.display.set_mode((W, H))
pygame.display.set_caption("procedural fish")
clock = pygame.time.Clock()
overlay = pygame.Surface((W, H), pygame.SRCALPHA)

def polar(angle, length=1.0):
    return pygame.Vector2(math.cos(angle), math.sin(angle)) * length

def heading(v):
    return math.atan2(v.y, v.x)

def wrap(angle):                          # to (-pi, pi]
    return (angle + math.pi) % TAU - math.pi

def steer(angle, want, limit):            # turn angle toward want, at most limit
    return angle + max(-limit, min(limit, wrap(want - angle)))

def hsva(h, s, v):
    color = pygame.Color(0)
    color.hsva = (h % 360, s, v, 100)
    return color

def smooth(pts, steps=6):                 # closed Catmull-Rom spline through pts
    out = []
    for i in range(len(pts)):
        p0, p1, p2, p3 = pts[i - 1], pts[i], pts[(i + 1) % len(pts)], pts[(i + 2) % len(pts)]
        for k in range(steps):
            t = k / steps
            out.append(0.5 * (2 * p1 + (p2 - p0) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t * t
                              + (3 * p1 - 3 * p2 + p3 - p0) * t ** 3))
    return out

def ellipse(c, rx, ry, rot, steps=18):
    return [c + pygame.Vector2(rx * math.cos(k * TAU / steps),
                               ry * math.sin(k * TAU / steps)).rotate_rad(rot)
            for k in range(steps)]

def shape(pts, color):
    pygame.draw.polygon(screen, color, pts)
    pygame.draw.aalines(screen, (170, 185, 200), True, pts)

class Chain:                              # joints trail the head, bending at most bend per link
    def __init__(self, n, link, bend):
        self.link, self.bend = link, bend
        self.joints = [pygame.Vector2(W / 2, H / 2 + i * link) for i in range(n)]
        self.angles = [0.0] * n

    def resolve(self, head):
        self.angles[0] = heading(head - self.joints[0])
        self.joints[0] = pygame.Vector2(head)
        for i in range(1, len(self.joints)):
            self.angles[i] = steer(self.angles[i - 1],
                                   heading(self.joints[i - 1] - self.joints[i]), self.bend)
            self.joints[i] = self.joints[i - 1] - polar(self.angles[i], self.link)

class Fish:
    WIDTHS = [w * S for w in (68, 81, 84, 83, 77, 64, 51, 38, 32, 19)]

    def __init__(self, hue):
        self.hue = hue
        self.dir = 0.0
        self.spine = Chain(12, 64 * S, math.pi / 8)

    def side(self, i, off, extra=0.0):    # a point on the body edge at joint i
        return self.spine.joints[i] + polar(self.spine.angles[i] + off, self.WIDTHS[i] + extra)

    def swim(self, target):               # pursue the target with a capped turn rate
        head = self.spine.joints[0]
        self.dir = steer(self.dir, heading(target - head), 0.04)
        self.spine.resolve(head + polar(self.dir, min((target - head).length(), 8 * S)))

    def draw(self):
        j, a = self.spine.joints, self.spine.angles
        body, fin = hsva(self.hue, 85, 72), hsva(self.hue, 55, 85)
        bend = wrap(a[6] - a[0]) + wrap(a[11] - a[6])     # spine curvature flexes the fins

        for s in (1, -1):                                 # pectoral and ventral fin pairs
            shape(ellipse(self.side(3, s * math.pi / 3), 80 * S, 32 * S, a[2] - s * math.pi / 4), fin)
            shape(ellipse(self.side(7, s * math.pi / 2), 48 * S, 16 * S, a[6] - s * math.pi / 4), fin)

        web = max(-13 * S, min(13 * S, bend * 6))
        tail = ([j[i] + polar(a[i] - math.pi / 2, 1.5 * bend * (i - 8) ** 2) for i in range(8, 12)]
                + [j[i] + polar(a[i] + math.pi / 2, web) for i in reversed(range(8, 12))])
        shape(smooth(tail), fin)

        outline = ([self.side(i, math.pi / 2) for i in range(10)] + [self.side(9, math.pi)]
                   + [self.side(i, -math.pi / 2) for i in reversed(range(10))]
                   + [self.side(0, o, x) for o, x in ((-math.pi / 6, 0), (0, 4 * S), (math.pi / 6, 0))])
        shape(smooth(outline), body)

        dorsal = [j[4], j[5], j[6], j[7],
                  j[6] + polar(a[6] + math.pi / 2, wrap(a[7] - a[0]) * 16 * S),
                  j[5] + polar(a[5] + math.pi / 2, wrap(a[6] - a[0]) * 16 * S)]
        shape(smooth(dorsal), fin)

class Bubble:
    def __init__(self):
        self.respawn(random.uniform(0, H))

    def respawn(self, y=H + 10):
        self.pos = pygame.Vector2(random.uniform(0, W), y)
        self.r = random.uniform(1, 4)
        self.speed = random.uniform(0.3, 1.1)
        self.phase = random.uniform(0, TAU)
        self.alpha = random.randint(20, 60)

    def update(self):
        self.phase += 0.02
        self.pos += (math.sin(self.phase) * 0.3, -self.speed)
        if self.pos.y < -10:
            self.respawn()
        pygame.draw.circle(overlay, (180, 220, 255, self.alpha), self.pos, self.r, 1)

def caustics(t):                          # drifting light blobs on the water
    for i in range(6):
        c = pygame.Vector2(W * 0.3 + math.sin(t * 0.0003 + i * 1.2) * W * 0.3,
                           H * 0.3 + math.cos(t * 0.0004 + i * 0.9) * H * 0.3)
        r = 80 + math.sin(t * 0.001 + i) * 40
        pygame.draw.polygon(overlay, (74, 143, 184, 8), ellipse(c, r, r * 0.6, t * 0.0001 + i))

fish = [Fish(0), Fish(180)]               # a complementary pair, half an orbit apart
bubbles = [Bubble() for _ in range(30)]
ORBIT = (11 * 64 * S + max(Fish.WIDTHS) * 6) / math.pi    # both fish fit the circle comfortably
center = pygame.Vector2(W / 2, H / 2)
mouse = pygame.Vector2(center)
credit = pygame.font.Font(None, 22).render("after argonaut - youtu.be/qlfh_rv6khY", True, (255, 255, 255))
credit.set_alpha(90)

def swim_all(t):
    for k, f in enumerate(fish):
        r = ORBIT * (1 + 0.08 * math.sin(t * 0.003 + k * 0.7 * math.pi))
        f.swim(center + polar(t * 0.0009 + k * math.pi + 0.5, r))

for i in range(400):                      # warm-up so the fish start mid-glide
    swim_all(i * 16.0)

t = 0.0
while True:
    for e in pygame.event.get():
        if e.type == pygame.QUIT:
            raise SystemExit
        if e.type == pygame.MOUSEMOTION:
            mouse.update(e.pos)

    center += (mouse - center) * 0.03
    swim_all(t)

    screen.fill((10, 22, 40))
    overlay.fill((0, 0, 0, 0))
    caustics(t)
    for b in bubbles:
        b.update()
    screen.blit(overlay, (0, 0))
    for f in reversed(fish):
        f.draw()
        f.hue += 0.2                      # the pair drifts around the color wheel together
    screen.blit(credit, credit.get_rect(midbottom=(W // 2, H - 10)))

    pygame.display.flip()
    t += clock.tick(60)
`,

  "Arrow-key square": String.raw`# Click the canvas first so it gets keyboard focus!

  "Snake": String.raw`# Arrow keys to steer. R restarts after game over. (Click the canvas first!)
import pygame, random

CELL, COLS, ROWS = 20, 32, 24

def main():
    pygame.init()
    screen = pygame.display.set_mode((COLS * CELL, ROWS * CELL))
    clock = pygame.time.Clock()
    font = pygame.font.Font(None, 42)

    while True:  # one iteration per game
        snake = [(COLS // 2, ROWS // 2)]
        d = (1, 0)
        food = (random.randrange(COLS), random.randrange(ROWS))
        score, alive = 0, True

        while alive:
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    raise SystemExit
                if event.type == pygame.KEYDOWN:
                    if event.key == pygame.K_LEFT  and d != (1, 0):  d = (-1, 0)
                    if event.key == pygame.K_RIGHT and d != (-1, 0): d = (1, 0)
                    if event.key == pygame.K_UP    and d != (0, 1):  d = (0, -1)
                    if event.key == pygame.K_DOWN  and d != (0, -1): d = (0, 1)

            head = (snake[0][0] + d[0], snake[0][1] + d[1])
            if (head in snake or not (0 <= head[0] < COLS) or not (0 <= head[1] < ROWS)):
                alive = False
            else:
                snake.insert(0, head)
                if head == food:
                    score += 1
                    food = (random.randrange(COLS), random.randrange(ROWS))
                else:
                    snake.pop()

            screen.fill((15, 18, 15))

  // appears immediately preceded by a quote (`"path` or `'path`). A bare substring scan would
  // false-positive on e.g. `load("boss.png")` when renaming `s.png`. Allocation-light: build the
  // two quoted needles once and substring-scan per line (no per-line regex / no code rewrite).
  const dq = '"' + oldName, sq = "'" + oldName;
  const hits = [];
  for (const file of project.order) {
    // project.files[name] is a live CodeMirror.Doc — read its TEXT via project.text(). We only
    // SCAN it; the student's code is never rewritten (the old load path stays verbatim).
    let text = "";
    try { text = project.text(file); } catch { continue; }
    if (typeof text !== "string" || (!text.includes(dq) && !text.includes(sq))) continue;
    const lines = text.split("\n");
    for (let i = 0; i < lines.length; i++) if (lines[i].includes(dq) || lines[i].includes(sq)) hits.push(`${file}:${i + 1}`);

// ----------------------------------------------------------------- upload routing (S5 #6)
// One router for BOTH live entry points (#assetInput change + document drop). Boot
// hydrate is NOT routed (it replays already-classified IndexedDB records, asset-only).
// Route by EXTENSION only: `.py` -> code (project.add, path-validated, editor via a
// fresh Doc + setActive, NEVER editor.setValue); everything else -> asset (assetFS.add).
// Land at <selectedFolder>/<name> (root default), unifying collisions through uniquePath.

// True if a path is taken by EITHER a code file OR an asset. A CODE upload yields to
// both (it must never silently clobber an asset OR a module at the same path), so the
// code lane suffixes against this unified predicate.
const existsAnywhere = (p) =>
  !!(project.files && project.files[p]) || assetFS.list.some(a => a.name === p);
// An ASSET upload only collides with ANOTHER ASSET at the same path: code + assets live
// in separate stores (project.files vs assetStore) and the zip-time `asset_` prefix
// disambiguates an asset that shares a CODE file's path — so an asset may coexist with a
// same-named module (it is NOT suffixed for that), but two assets can't share a path.
const assetExists = (p) => assetFS.list.some(a => a.name === p);

// Auto-suffix the LEAF before the extension until the path is free: `helper.py` ->
// `helper_2.py`, `sprites/ship.png` -> `sprites/ship-2.png`. CODE uses an UNDERSCORE
// (a hyphen fails isModuleName so a `.py` can't be `helper-2.py`); ASSETS use a HYPHEN
// (decision #6). `sep` is supplied by the caller per branch. Returns the free path.
function uniquePath(path, exists, sep = "-") {
  if (!exists(path)) return path;
  const slash = path.lastIndexOf("/");
  const dir = slash < 0 ? "" : path.slice(0, slash + 1);
  const leaf = slash < 0 ? path : path.slice(slash + 1);
  const dot = leaf.lastIndexOf(".");
  const stem = dot <= 0 ? leaf : leaf.slice(0, dot);
  const ext = dot <= 0 ? "" : leaf.slice(dot);
  for (let n = 2; ; n++) {
    const candidate = dir + stem + sep + n + ext;
    if (!exists(candidate)) return candidate;
  }
}

// Decide a file's lane. By EXTENSION (`.py` -> code) — with one guard: a file that is
// genuinely binary media (an image/audio MIME) but happens to carry a `.py` name is NOT
// code, it's an asset (the adversarial "asset named like a code file" case). Plain `.py`
// text (text/x-python, or no MIME) routes to code.
const isCodeUpload = (file) =>
  /\.py$/i.test(file.name) && !/^(image|audio|video)\//.test(file.type || "");

// Route ONE file into the SELECTED folder (root default), warning + auto-suffixing on a
// same-path clash via the unified helper.
async function routeUpload(file, destFolder = selectedFolder) {
  const folder = destFolder ? destFolder.replace(/\/$/, "") : "";
  const target = folder ? folder + "/" + file.name : file.name;
  const isCode = isCodeUpload(file);
  // Code uses an underscore suffix (isModuleName-safe) and yields to ANY same-path file
  // (code or asset); an asset uses a hyphen (decision #6) and only yields to another asset
  // (it coexists with a same-named module — the zip `asset_` prefix disambiguates).
  const final = uniquePath(target, isCode ? existsAnywhere : assetExists, isCode ? "_" : "-");
  if (final !== target)
    logLine(`"${target}" already exists — added as "${final}".`, "sys");
  if (isCode) {
    const text = await file.text();
    // project.add builds a fresh Doc; reach the editor via setActive/swapDoc — NEVER
    // editor.setValue (which arms lint + breaks first-paint laziness).
    if (project.add(final, text)) {
      // Mirror the asset path: write the new module to MEMFS now (nested-capable) so it's
      // importable without waiting for the next run. Reuses assetFS._memfs as a generic
      // bytes-to-path writer (not asset-specific).
      assetFS._memfs(final, new TextEncoder().encode(text));
      // S6 — a code file added in a room must reach peers. Mirror the add to the shared doc
      // exactly like newFilePrompt, but seed it with the uploaded TEXT (not ""); without this
      // the file is local-only and S6a's edit-listener refuses to seed a missing key, so it
      // stays permanently invisible to peers (the "half-relaxed gate"). Assets are NOT mirrored
      // (they live outside the CRDT shape — by design).
      roomOp(d => { d.files[encPath(final)] = text; if (!d.order.includes(encPath(final))) d.order.push(encPath(final)); });
      project.setActive(final);
      renderTabs();
    } else {
      logLine(`Couldn't add "${final}" — not a valid module path.`, "sys");
    }
  } else {
    await assetFS.add(file, final);   // name override lands the asset at `final`
  }
}

// Read asset bytes from MEMFS (where uploads are mirrored) and make an object URL.
function assetObjectURL(name) {
  const ext = (name.split(".").pop() || "").toLowerCase();
  const bytes = pyodide.FS.readFile(name);   // Uint8Array
  return URL.createObjectURL(new Blob([bytes], { type: MIME_FOR[ext] || "application/octet-stream" }));
}

function renderViewer(name) {
  viewerSel = name;
  const kind = classifyKind(name);
  const cmWrap = editor.getWrapperElement();
  vNameEl.textContent = name;
  if (kind === "py") {
    // Show the ONE CodeMirror; swapDoc into the file's Doc via the project seam (never setValue).
    viewerBodyEl.querySelectorAll(".imgview, .sound, .empty").forEach(n => n.remove());
    if (cmWrap.parentElement !== viewerBodyEl) viewerBodyEl.appendChild(cmWrap);   // bring CM back (same instance)
    vMetaEl.textContent = "· Python";
    runBtnEl.style.display = "";
    if (project.files[name] && project.active !== name) project.setActive(name);
    else editor.refresh();
    return;
  }
  // Non-.py: stash the CM wrapper out of #viewerBody (kept alive, never destroyed), render media.
  viewerBodyEl.querySelectorAll(".imgview, .sound, .empty").forEach(n => n.remove());
  if (cmWrap.parentElement !== cmStash) cmStash.appendChild(cmWrap);
  runBtnEl.style.display = "none";
  const ext = (name.split(".").pop() || "").toUpperCase();
  let surface = document.createElement("div");
  if (kind === "image") {
    vMetaEl.textContent = "· " + ext;
    try {
      const url = assetObjectURL(name);
      surface.className = "imgview";
      surface.innerHTML = `<div class="checker"><img alt="${escTab(name)}"></div><div class="vcaption" id="vImgCap">${escTab(name)} · ${ext}</div>`;
      const img = surface.querySelector("img");
      img.onload = () => { document.getElementById("vImgCap") && (document.getElementById("vImgCap").textContent = `${name} · ${img.naturalWidth}×${img.naturalHeight} · ${ext}`); URL.revokeObjectURL(url); };
      img.src = url;
    } catch (e) {
      surface.className = "empty";
      surface.innerHTML = `<div><div class="big">🖼️</div>Couldn't read ${escTab(name)}.</div>`;
    }
  } else if (kind === "audio") {
    vMetaEl.textContent = "· " + ext;
    surface.className = "sound";
    let html = `<div class="playerbar"><audio controls preload="metadata"></audio></div><div class="vcaption">${escTab(name)} · ${ext}</div>`;
    if (UNSUPPORTED_VIEW_AUDIO.test(name)) {
      html += `<div class="warnbanner"><span>⚠</span><span>Plays here, but pygame's audio can't load ${ext} — convert to WAV or OGG.</span></div>`;
    }
    surface.innerHTML = html;
    try {
      const url = assetObjectURL(name);
      const audio = surface.querySelector("audio");
      const revoke = () => URL.revokeObjectURL(url);
      audio.addEventListener("loadeddata", revoke, { once: true });
      audio.addEventListener("error", revoke, { once: true });
      audio.src = url;
    } catch (e) {}
  } else {
    vMetaEl.textContent = "· text";
    surface.className = "empty";
    surface.innerHTML = `<div><div class="big">📄</div>Can't open ${escTab(name)} here — only code, images, and sounds preview in the viewer.</div>`;
  }
  viewerBodyEl.appendChild(surface);
}

// S2: the nested folder tree. The source of truth stays project.order (files) +
// assetFS.list (assets) + project.emptyDirs (created-but-empty folders); renderTabs
// derives a transient display tree each render (no separate node model to desync).
// Folder open/closed is a RENDER-ONLY flag — a Set of COLLAPSED folder paths — so a
// toggle never mutates the model and never touches editor.setValue. Folders default to
// OPEN (a path is open unless the user collapsed it), so freshly-loaded/created folders
// reveal their children without bookkeeping per load.
const closedFolders = new Set();   // collapsed folder paths (render-only)
const isFolderOpen = (path) => !closedFolders.has(path);
// The folder a new file/folder is created relative to (the selected file's dir, or a
// selected folder). Cleared to ROOT on a folder toggle/delete.
let selectedFolder = "";

// Build a nested display tree: { name, path, dirs:Map<seg,node>, files:[{path,kind,asset,warn,entry,active}] }
function buildTree() {
  const root = { name: "", path: "", dirs: new Map(), files: [] };
  const ensureDir = (path) => {
    if (!path) return root;
    let node = root;
    const segs = path.split("/");
    let acc = "";
    for (const seg of segs) {
      acc = acc ? acc + "/" + seg : seg;
      if (!node.dirs.has(seg)) node.dirs.set(seg, { name: seg, path: acc, dirs: new Map(), files: [] });
      node = node.dirs.get(seg);
    }
    return node;
  };
  const place = (path, meta) => {
    const slash = path.lastIndexOf("/");
    const dir = slash < 0 ? "" : path.slice(0, slash);
    ensureDir(dir).files.push({ path, ...meta });
  };
  for (const name of project.order)
    place(name, { kind: "py", asset: false, active: name === viewerSel });
  for (const a of assetFS.list)
    place(a.name, { kind: classifyKind(a.name), asset: true, warn: a.warn, active: a.name === viewerSel });
  for (const d of project.emptyDirs) ensureDir(d);
  return root;
}

function renderTabs() {
  // Drop a stale selected-folder (e.g. after a project.load swapped the file set) so a
  // new file/folder isn't created under a directory that no longer exists.
  if (selectedFolder && !project._fileDirs().has(selectedFolder) && !project.emptyDirs.has(selectedFolder))
    selectedFolder = "";
  const tree = buildTree();
  const out = [];
  const emit = (node, depth) => {
    // Folders first, then files in project order within this dir. #11: child dirs render by their
    // index in project.dirOrder (an explicit reorder); dirs absent from it fall back to alphabetical
    // AFTER the listed ones — so un-reordered / old projects stay alphabetical (today's behavior).
    const dirNodes = [...node.dirs.values()].sort((a, b) => {
      const ia = project.dirOrder.indexOf(a.path), ib = project.dirOrder.indexOf(b.path);
      const ka = ia < 0 ? Infinity : ia, kb = ib < 0 ? Infinity : ib;
      if (ka !== kb) return ka - kb;
      return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
    });
    for (const d of dirNodes) {
      const open = isFolderOpen(d.path);
      const pad = 6 + depth * 14;
      out.push(`<div class="tab folder${open ? " open" : ""}" data-path="${escTab(d.path)}" style="padding-left:${pad}px">` +
        `<span class="caret" aria-hidden="true">▸</span>` +
        `<span class="ic" aria-hidden="true">📁</span>` +
        `<span class="tab-name">${escTab(d.name)}</span>` +
        `<button class="tab-menu" title="Folder actions" aria-haspopup="menu" aria-expanded="false" aria-label="Folder actions for ${escTab(d.path)}">⋯</button>` +
        `</div>`);
      if (open) emit(d, depth + 1);
    }
    for (const f of node.files) {
      const pad = 6 + depth * 14 + 12;   // +12 to align past where a caret would sit
      if (f.asset) {
        out.push(`<div class="tab asset${f.active ? " active" : ""}" data-name="${escTab(f.path)}" style="padding-left:${pad}px">` +
          `<span class="ic" aria-hidden="true">${f.kind === "image" ? "🖼️" : f.kind === "audio" ? "🔊" : "📄"}</span>` +
          `<span class="tab-name">${escTab(basename(f.path))}</span>` +
          (f.warn ? '<span class="asset-warn" title="Only WAV and OGG play in the browser audio engine — convert this file.">⚠</span>' : "") +
          `<button class="tab-menu" title="Asset actions" aria-haspopup="menu" aria-expanded="false" aria-label="Asset actions for ${escTab(f.path)}">⋯</button>` +
          `</div>`);
      } else {
        out.push(`<div class="tab py${f.active ? " active" : ""}${f.path === runFile ? " running" : ""}" data-name="${escTab(f.path)}" style="padding-left:${pad}px">` +
          `<span class="ic" aria-hidden="true">🐍</span>` +
          `<span class="tab-name">${escTab(basename(f.path))}</span>` +
          (modifiedExamples.has(f.path) ? `<span class="moddot" data-tip="Modified — now your file">●</span>` : "") +
          `<button class="tab-menu" title="File actions" aria-haspopup="menu" aria-expanded="false" aria-label="File actions for ${escTab(f.path)}">⋯</button>` +
          `</div>`);
      }
    }
  };
  emit(tree, 0);
  tabsEl.innerHTML = out.join("");
  editor.refresh();
}
window.renderTabs = renderTabs;   // test seam
const basename = (p) => { const i = p.lastIndexOf("/"); return i < 0 ? p : p.slice(i + 1); };
const dirname = (p) => { const i = p.lastIndexOf("/"); return i < 0 ? "" : p.slice(0, i); };
// #7: per-row download moved into the ⋯ menu (file → downloadItem, folder → downloadFolder zip,
// asset → downloadItem). The standalone .dl button + its click branch are retired.
tabsEl.addEventListener("click", (e) => {
  // #11: a pointer-drag ends by firing a click — swallow it so a completed drag doesn't ALSO
  // open/toggle the row it landed on. Reset by the next pointerdown (covers capture-suppressed clicks).
  if (suppressClick) { suppressClick = false; return; }
  const folder = e.target.closest(".tab.folder");
  if (folder) {
    const path = folder.dataset.path;
    const menuBtn = e.target.closest(".tab-menu");
    if (menuBtn) { folderMenu(path); return; }
    // caret / folder row → render-only toggle (no model mutation, no setValue).
    selectedFolder = path;
    if (closedFolders.has(path)) closedFolders.delete(path); else closedFolders.add(path);
    renderTabs();
    return;
  }
  const menuBtn = e.target.closest(".tab-menu");
  const tab = e.target.closest(".tab");
  if (!tab) return;
  const name = tab.dataset.name;
  // Slice C follow-up A: route the ⋯ menu by the CLICKED ROW'S TYPE, not a project.files[name] path
  // lookup — so a code file and an asset sharing the same data-name each open their own menu.
  if (menuBtn) { if (tab.classList.contains("asset")) assetMenu(name); else tabMenu(name); return; }
  selectedFolder = dirname(name);
  renderViewer(name);   // .py -> CM swapDoc via setActive; asset -> media surface
  renderTabs();
});

// ----- pointer-events drag controller (#11) — replaces native HTML5 DnD, which is UNTESTABLE in
// headless (a real mouse gesture fires ZERO native-drag events) and fragile (the drop-line was
// rebuilt + re-inserted every dragover, so hovering it removed it and DOM mutation shifted rows under
// the cursor). This drives off pointerdown/move/up (dispatchable + reliable cross-browser), resolves
// the drop target by CURSOR-Y over the rendered rows (NOT e.target), reuses ONE drop indicator, and
// tells a drag from a click via a small movement threshold. It reorders files (project.order) and
// folders (project.dirOrder, siblings only) and moves files/folders/assets into a folder. Never
// editor.setValue. Escape / pointercancel abort cleanly.
const DRAG_THRESHOLD = 5;   // px of movement before a press becomes a drag (below this stays a click)
let drag = null;            // active gesture state (see pointerdown), or null when idle
let suppressClick = false;  // swallow the click a completed drag would otherwise fire (open/toggle)

// dest folder is the dragged folder itself or a descendant of it → block (can't move a folder in there).
function isDescendantDrop(draggedFolder, destFolder) {
  if (!draggedFolder) return false;
  return destFolder === draggedFolder || (destFolder + "/").startsWith(draggedFolder + "/");
}

const _rowRects = (sel) => [...tabsEl.querySelectorAll(sel)].map(el => ({ el, rect: el.getBoundingClientRect() }));
const _within = (items, y) => { for (const it of items) if (y >= it.rect.top && y <= it.rect.bottom) return it.el; return null; };
function _nearest(items, y) {
  let best = null, bd = Infinity;
  for (const it of items) {
    const d = y < it.rect.top ? it.rect.top - y : (y > it.rect.bottom ? y - it.rect.bottom : 0);
    if (d < bd) { bd = d; best = it.el; }
  }
  return best;
}

// Resolve the drop INTENT from the cursor Y over the rendered rows. Returns one of:
//   { type:"into", folder }                 move the dragged item into this folder
//   { type:"reorder-file", ref, after }     reposition the dragged file before/after this file (project.order)
//   { type:"reorder-folder", ref, after }   reposition the dragged folder before/after this SIBLING (dirOrder)
// or null (no valid target under the cursor).
function computeDrop(y) {
  const draggedDir = dirname(drag.path);
  if (drag.isFolder) {
    // folder drag → targets are folder rows that are not the dragged folder or a descendant of it.
    const folders = _rowRects(".tab.folder").filter(it => it.el.dataset.path && !isDescendantDrop(drag.path, it.el.dataset.path));
    const inside = _within(folders, y);
    if (inside) {
      const r = inside.getBoundingClientRect();
      const frac = (y - r.top) / r.height;
      const sibling = dirname(inside.dataset.path) === draggedDir;
      if (frac >= 0.25 && frac <= 0.75) return { type: "into", folder: inside.dataset.path };   // middle band
      if (sibling) return { type: "reorder-folder", ref: inside.dataset.path, after: frac > 0.5 };
      return { type: "into", folder: inside.dataset.path };   // non-sibling edge → move-into
    }
    // not over any folder → reorder to the nearest SIBLING folder's edge (dragged past the ends).
    const near = _nearest(folders.filter(it => dirname(it.el.dataset.path) === draggedDir), y);
    if (!near) return null;
    const r = near.getBoundingClientRect();
    return { type: "reorder-folder", ref: near.dataset.path, after: y > r.top + r.height / 2 };
  }
  // file / asset drag → a folder under the cursor means move-into it (unless the item is already there).
  const fhit = _within(_rowRects(".tab.folder"), y);
  if (fhit && fhit.dataset.path !== draggedDir) return { type: "into", folder: fhit.dataset.path };
  if (drag.isAsset) return null;   // assets have no order (v1) — only move-into a folder
  // otherwise reorder among files (project.order), relative to the nearest file row.
  const near = _nearest(_rowRects(".tab.py").filter(it => it.el.dataset.name !== drag.path), y);
  if (!near) return null;
  const r = near.getBoundingClientRect();
  return { type: "reorder-file", ref: near.dataset.name, after: (y - r.top) > r.height / 2 };
}

// Paint the resolved intent: the ONE reused indicator line for a reorder, a .drop-into highlight for a
// move-into. The caller (pointermove) clears the previous marks BEFORE measuring, so the 2px indicator
// never perturbs the rects computeDrop reads (the residual of the native drop-line thrash this kills).
function paintDrop() {
  const d = drag.drop;
  if (!d) return;
  if (d.type === "into") {
    const el = tabsEl.querySelector(`.tab.folder[data-path="${cssAttr(d.folder)}"]`);
    if (el) { el.classList.add("drop-into"); drag.intoEl = el; }
  } else {
    const sel = d.type === "reorder-folder" ? `.tab.folder[data-path="${cssAttr(d.ref)}"]` : `.tab.py[data-name="${cssAttr(d.ref)}"]`;
    const el = tabsEl.querySelector(sel);
    if (el) { if (d.after) el.after(drag.indicator); else el.before(drag.indicator); }
  }
}

// Best-effort edge auto-scroll while dragging near the panel's top/bottom.
function autoScroll(y) {
  const sc = drag.scroller;
  if (!sc) return;
  const r = sc.getBoundingClientRect(), M = 24;
  if (y < r.top + M) sc.scrollTop -= Math.ceil((r.top + M - y) / 4);
  else if (y > r.bottom - M) sc.scrollTop += Math.ceil((y - (r.bottom - M)) / 4);
}

// Apply the resolved drop to the MODEL (+ render + persist + collab mirror). Never editor.setValue.
function applyDrop() {
  const d = drag.drop, path = drag.path;
  if (!d) return;
  if (d.type === "into") {
    const dest = d.folder;
    if (drag.isAsset) {
      // an ASSET re-keys via assetFS.move (atomic IndexedDB + MEMFS + list + warn-on-move; async,
      // re-renders itself). Assets can't be folders, so no descendant guard is needed.
      if (dest === dirname(path)) return;
      assetFS.move(path, dest).then(() => { closedFolders.delete(dest); flushSave(); });
      return;
    }
    if (drag.isFolder && isDescendantDrop(path, dest)) return;   // can't move a folder into itself/descendant
    if (!drag.isFolder && dest === dirname(path)) return;        // already there
    const beforeMove = [...project.order];
    if (project.move(path, dest)) {
      closedFolders.delete(dest);
      mirrorMove(beforeMove, project.order);   // S6b: mirror each re-keyed child to peers (positional)
      renderTabs(); flushSave();
    }
  } else if (d.type === "reorder-file") {
    if (!project.files[path] || !project.files[d.ref] || path === d.ref) return;
    const ord = project.order;
    ord.splice(ord.indexOf(path), 1);
    const idx = ord.indexOf(d.ref) + (d.after ? 1 : 0);
    ord.splice(idx, 0, path);
    roomOp(dd => { dd.order = project.order.map(encPath); });   // S6b: files only changed position
    renderTabs(); flushSave();
  } else if (d.type === "reorder-folder") {
    if (path === d.ref || dirname(path) !== dirname(d.ref)) return;   // siblings only
    const parent = dirname(path);
    // the current sibling render order (DOM order), with `path` repositioned relative to `ref`.
    const seq = [...tabsEl.querySelectorAll(".tab.folder")].map(r => r.dataset.path)
      .filter(p => dirname(p) === parent && p !== path);
    const refIdx = seq.indexOf(d.ref);
    if (refIdx < 0) return;   // ref row vanished mid-gesture (e.g. a concurrent remote re-render) — bail
    seq.splice(refIdx + (d.after ? 1 : 0), 0, path);
    // Write the sibling block to dirOrder in the new order. buildTree's emit() only ever compares
    // dirs with the SAME parent, so re-appending this block (other dirs kept in place) sets the order.
    project.dirOrder = [...project.dirOrder.filter(p => !seq.includes(p)), ...seq];
    renderTabs(); flushSave();
  }
}

function dragCleanup() {
  if (!drag) return;
  if (drag.row) { drag.row.classList.remove("drag-ghost"); try { drag.row.releasePointerCapture(drag.pointerId); } catch {} }
  if (drag.indicator && drag.indicator.parentNode) drag.indicator.remove();
  if (drag.intoEl) drag.intoEl.classList.remove("drop-into");
  drag = null;
}

function scrollParentOf(el) {
  let n = el && el.parentElement;
  while (n && n !== document.body) {
    const s = getComputedStyle(n);
    if (/(auto|scroll)/.test(s.overflowY) && n.scrollHeight > n.clientHeight) return n;
    n = n.parentElement;
  }
  return null;
}

tabsEl.addEventListener("pointerdown", (e) => {
  if (drag) return;                                      // a gesture is already active (e.g. a 2nd pointer)
  suppressClick = false;                                 // start of a fresh gesture
  if (e.button !== 0) return;                            // primary button only
  const row = e.target.closest(".tab");
  if (!row) return;
  if (e.target.closest(".tab-menu") || e.target.closest("input")) return;   // ⋯ menu + inline inputs never drag
  const path = row.dataset.name || row.dataset.path;
  if (!path) return;
  drag = {
    path, isFolder: row.classList.contains("folder"), isAsset: row.classList.contains("asset"),
    startX: e.clientX, startY: e.clientY, dragging: false, row, indicator: null, intoEl: null,
    drop: null, pointerId: e.pointerId, scroller: scrollParentOf(tabsEl),
  };
});

window.addEventListener("pointermove", (e) => {
  if (!drag || e.pointerId !== drag.pointerId) return;   // only the gesture's own pointer
  if (!drag.dragging) {
    if (Math.abs(e.clientX - drag.startX) < DRAG_THRESHOLD && Math.abs(e.clientY - drag.startY) < DRAG_THRESHOLD) return;
    drag.dragging = true;                                // crossed the threshold → begin dragging
    drag.row.classList.add("drag-ghost");
    drag.indicator = document.createElement("div");
    drag.indicator.className = "drop-line";
    try { drag.row.setPointerCapture(drag.pointerId); } catch {}
  }
  e.preventDefault();
  // Clear last frame's marks BEFORE measuring, so the 2px indicator never perturbs the rects.
  if (drag.indicator.parentNode) drag.indicator.remove();
  if (drag.intoEl) { drag.intoEl.classList.remove("drop-into"); drag.intoEl = null; }
  drag.drop = computeDrop(e.clientY);
  paintDrop();
  autoScroll(e.clientY);
});

window.addEventListener("pointerup", (e) => {
  if (!drag || e.pointerId !== drag.pointerId) return;   // ignore a different pointer's release
  if (drag.dragging) { applyDrop(); suppressClick = true; }   // a real drag → apply + swallow the click
  dragCleanup();
});
window.addEventListener("pointercancel", (e) => { if (drag && e.pointerId === drag.pointerId) dragCleanup(); });
window.addEventListener("keydown", (e) => { if (e.key === "Escape" && drag) dragCleanup(); });
// #8 (refinement v2): new file/folder via an INLINE editable row (no browser prompt), matching the
// inline-rename UX. The header buttons call these; both open startInlineCreate.
function newFilePrompt() { startInlineCreate("file"); }
function newFolderPrompt() { startInlineCreate("folder"); }

// The model+side-effect half (returns true on success; false keeps the inline row open with a hint).
function createFile(raw, hint) {
  const leaf = raw.endsWith(".py") ? raw : raw + ".py";
  // Create relative to the selected folder unless the typed name already carries a path.
  const name = (selectedFolder && !leaf.includes("/")) ? selectedFolder + "/" + leaf : leaf;
  if (!project.add(name)) { hint("a valid, unique name ending in .py"); return false; }
  if (selectedFolder) project.emptyDirs.delete(selectedFolder);   // folder now occupied
  if (dirname(name)) closedFolders.delete(dirname(name));
  project.setActive(name);
  renderViewer(name);
  // S6b: mirror the new file to the shared doc — plain assignment (updateText can't create a key).
  roomOp(d => { d.files[encPath(name)] = ""; d.order.push(encPath(name)); });
  renderTabs(); flushSave();
  return true;
}
// S2: empty folder, validated as a Python-identifier-safe segment, relative to the selected folder
// (else ROOT). Persists via emptyDirs. NOTE: empty folders are intentionally NOT mirrored to the
// collab room (excluded from the shared shape), so there is no roomOp here.
function createFolder(raw, hint) {
  const seg = raw.trim();
  if (!isFolderSegment(seg)) { hint("letters, digits, _ (no leading digit)"); return false; }
  const path = selectedFolder ? selectedFolder + "/" + seg : seg;
  if (!project.addFolder(path)) { hint("that folder already exists or is invalid"); return false; }
  closedFolders.delete(path);
  renderTabs(); flushSave();
  return true;
}
// A transient editable row appended to the tree; Enter commits (createFile/createFolder), Esc/blur
// cancels. Reuses the .rename-input look + the calm inline-hint of startInlineRename. Created under
// the selected folder (made visible) or at root. One create row at a time.
function startInlineCreate(kind) {
  // Guard BEFORE any renderTabs: if a create row is already open, keep it (don't repaint it away
  // or stack a second one). (#9-review: the old guard ran AFTER renderTabs and never fired.)
  if (tabsEl.querySelector(".tab.creating")) return;
  if (selectedFolder) closedFolders.delete(selectedFolder);   // ensure the destination is visible
  renderTabs();
  const depth = selectedFolder ? selectedFolder.split("/").length : 0;
  const pad = 6 + depth * 14 + (kind === "folder" ? 0 : 12);
  const row = document.createElement("div");
  row.className = `tab ${kind === "folder" ? "folder" : "py"} creating`;
  row.style.paddingLeft = pad + "px";
  row.innerHTML = `<span class="ic" aria-hidden="true">${kind === "folder" ? "📁" : "🐍"}</span>`;
  const input = document.createElement("input");
  input.type = "text";
  input.className = "rename-input";
  input.setAttribute("aria-label", kind === "folder" ? "New folder name" : "New file name");
  row.appendChild(input);
  tabsEl.appendChild(row);
  let done = false;
  const cancel = () => { if (done || !row.isConnected) return; done = true; renderTabs(); };   // #9-review: a stale deferred blur-cancel on a detached row must not repaint over a newer row
  const hint = (msg) => {
    input.classList.add("invalid");
    let h = row.querySelector(".rename-hint");
    if (!h) { h = document.createElement("span"); h.className = "rename-hint"; row.appendChild(h); }
    h.textContent = msg; input.focus();
  };
  const tryCommit = () => {
    if (done) return;
    const raw = input.value.trim();
    if (!raw) { cancel(); return; }                                  // empty -> cancel cleanly
    const ok = kind === "folder" ? createFolder(raw, hint) : createFile(raw, hint);
    if (ok === false) return;                                        // stay in edit; hint shown
    done = true;                                                     // success -> create*() re-rendered (drops this row)
  };
  input.focus();
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); tryCommit(); }
    else if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); cancel(); }
  });
  input.addEventListener("input", () => { input.classList.remove("invalid"); const h = row.querySelector(".rename-hint"); if (h) h.remove(); });

// =============================================================== Slice B: popup action menu
// ONE shared popup instance, anchored to the clicked row's ⋯. Opening it (via tabMenu /

const popMenuEl = document.createElement("div");

document.body.appendChild(popMenuEl);

function closePopMenu(restoreFocus = true) {

// Open the popup for `anchorBtn` with a list of {label, icon, danger, run} items.

    mi.className = "mi" + (it.danger ? " danger" : "");

  const r = anchorBtn.getBoundingClientRect();

  if (left + mw > window.innerWidth - 6) left = Math.max(6, r.right - mw);
  if (top + mh > window.innerHeight - 6) top = Math.max(6, r.top - mh - 4);
  popMenuEl.style.top = (top + sy) + "px";
  popMenuEl.style.left = (left + sx) + "px";

// Keyboard nav within the menu: ArrowUp/Down move, Enter/Space activate, Esc/Tab close.
popMenuEl.addEventListener("keydown", (e) => {
  const its = [...popMenuEl.querySelectorAll(".mi")];
  if (!its.length) return;
  let i = its.indexOf(document.activeElement);
  if (e.key === "ArrowDown") { e.preventDefault(); its[(i + 1 + its.length) % its.length].focus(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); its[(i - 1 + its.length) % its.length].focus(); }

// =============================================================== Slice B: inline rename
// Swap a row's name span for an <input> (basename prefilled, stem selected). Enter validates +
// commits via `commit(newName)` (returns true on success); Esc/blur cancels. An invalid name keeps
// the input open with a calm inline hint. NEVER editor.setValue — commit re-keys through the model
// seams (project.rename / assetFS.rename) which preserve the live Doc / re-key MEMFS in lock-step.
function startInlineRename(rowSel, fullPath, commit) {
  closePopMenu(false);
  const row = document.querySelector(rowSel);
  if (!row) return;
  const nameSpan = row.querySelector(".tab-name");
  if (!nameSpan || row.querySelector(".rename-input")) return;
  const base = basename(fullPath);
  const dot = base.lastIndexOf(".");
  const input = document.createElement("input");
  input.type = "text";
  input.className = "rename-input";
  input.value = base;
  input.setAttribute("aria-label", `Rename ${base}`);
  let done = false;
  let pending = false;   // an async commit (asset rename) is in flight — block re-commit + blur-cancel
  const cleanup = () => { try { row.classList.remove("renaming"); } catch {} };
  const cancel = () => { if (done || pending) return; done = true; cleanup(); renderTabs(); };
  const tryCommit = () => {
    if (done || pending) return;
    const raw = input.value.trim();
    if (!raw || raw === base) { cancel(); return; }   // no-op / empty -> cancel cleanly
    // Reconstruct the full path: keep the row's directory, swap the basename.
    const dir = dirname(fullPath);
    const next = dir ? dir + "/" + raw : raw;
    const hint = (msg) => {
      input.classList.add("invalid");
      let h = row.querySelector(".rename-hint");
      if (!h) { h = document.createElement("span"); h.className = "rename-hint"; row.appendChild(h); }
      h.textContent = msg;
      input.focus();
    };
    const res = commit(next, raw, hint);
    // Async commit (asset rename: IndexedDB + MEMFS re-key validates AFTER the call). Don't close
    // the input until the real result is known — on rejection (collision / bad path / unreadable /
    // storage-full) keep the row in edit with a calm inline hint, mirroring the sync file/folder path.
    if (res && typeof res.then === "function") {
      pending = true;            // block re-commit + the blur-cancel while the async re-key runs.
      input.readOnly = true;     // visually freeze (readOnly, NOT disabled — disabling a focused
                                 // input fires blur, which would race the pending guard).
      res.then((ok) => {
        pending = false;
        if (done) return;        // a repaint (renderTabs) already replaced the input on success
        input.readOnly = false;
        if (ok) { done = true; cleanup(); }       // success but no repaint happened: close cleanly
        else { hint("invalid or in use"); }       // failure: stay in edit, surface the hint
      }, () => { pending = false; if (!done) { input.readOnly = false; hint("rename failed"); } });
      return;
    }
    if (res === false) return;   // stay in edit; hint already shown
    done = true; cleanup();      // success -> the handler re-rendered (renderTabs)
  };
  nameSpan.replaceWith(input);
  row.classList.add("renaming");
  // select the stem (name without extension) so a quick retype keeps the ext.
  input.focus();
  if (dot > 0) input.setSelectionRange(0, dot); else input.select();
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); tryCommit(); }
    else if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); cancel(); }
  });
  input.addEventListener("input", () => { input.classList.remove("invalid"); const h = row.querySelector(".rename-hint"); if (h) h.remove(); });
  input.addEventListener("blur", () => { setTimeout(() => { if (!done) cancel(); }, 0); });
}

// S2: folder actions via the folder row's ⋯ menu. Slice B: a popup [role=menu] (Rename · Delete)
// anchored to the ⋯; Rename is inline; Delete keeps the confirm. Rename re-keys every descendant;
// delete removes the subtree. All model+render — never editor.setValue.
function folderMenu(path) {
  const anchor = rowMenuBtn(`#tabs .tab.folder[data-path="${cssAttr(path)}"]`);
  if (!anchor) return;
  openPopMenu(anchor, [
    { label: "Rename", icon: "✎", run: () => folderRenameInline(path) },
    { label: "Delete", icon: "🗑", danger: true, run: () => folderDelete(path) },
    { label: "Download", icon: "⬇", run: () => downloadFolder(path) },   // #7: zip of the subtree
  ]);
}
function folderRenameInline(path) {
  startInlineRename(`#tabs .tab.folder[data-path="${cssAttr(path)}"]`, path, (newPath, leaf, hint) => {
    const next = (leaf || "").trim();
    if (!isFolderSegment(next)) { hint("letters, digits, _"); return false; }
    const parent = dirname(path);
    const target = parent ? parent + "/" + next : next;
    if (target === path) return true;   // no-op
    const prefix = path + "/";
    const kids = project.order.filter(p => p.startsWith(prefix));
    if (project.files[target] || project.order.some(p => p.startsWith(target + "/")) || project.emptyDirs.has(target)) { hint("already exists"); return false; }
    const beforeFolderRename = [...project.order];
    for (const k of kids) project.rename(k, target + k.slice(path.length));
    mirrorMove(beforeFolderRename, project.order);   // S6b: mirror the per-descendant re-key
    if (project.emptyDirs.delete(path)) project.emptyDirs.add(target);
    project._rekeyDirOrder(path, target);   // #11: keep the renamed folder's render position

    }

    // Warn-don't-rewrite: a folder re-key can't fix `import sprites.enemy` references; surface a
    // calm console note (same house surface as the asset warn-on-move) — never rewrite student code.
    assetMsg(`Renamed folder to "${target}". 'import ${path.replace(/\//g, ".")}' references in other files are NOT updated — fix them manually. (Your code was not changed.)`);
    renderTabs(); flushSave();

}
function folderDelete(path) {

  if (!confirm(`Delete folder "${path}" and ${kids.length} file${kids.length === 1 ? "" : "s"}? This can't be undone.`)) return;
  const beforeFolderDel = [...project.order];
  for (const k of kids) project.remove(k);
  mirrorDeletes(beforeFolderDel.filter(k => !project.files[k]));   // S6b: mirror dropped children

  for (const p of [...closedFolders]) if (p === path || p.startsWith(prefix)) closedFolders.delete(p);

}
function tabMenu(name) {

  if (!project.files[name]) { if (assetFS.list.some(a => a.name === name)) assetMenu(name); return; }

  const anchor = rowMenuBtn(`#tabs .tab.py[data-name="${cssAttr(name)}"]`);

    { label: "Delete", icon: "🗑", danger: true, run: () => fileDelete(name) },

function fileRenameInline(name) {

  // assets and .py files interleaved, so an unqualified selector could land the input on the asset row).
  startInlineRename(`#tabs .tab.py[data-name="${cssAttr(name)}"]`, name, (next, leaf, hint) => {
    if (!next.endsWith(".py")) next += ".py";
    if (next === name) return true;   // no-op

    // project.rename preserves the SAME live Doc (files[next] = files[name]); the editor stays
    // bound to it without any setValue. Carry the viewer selection across the re-key.

// Asset row actions via the ⋯ menu — Rename · Delete · Download. Wired to the assetFS model seams

function assetRenameInline(name) {

    if (next === name) return true;   // no-op

let saveTimer = null;

function flushSave() {

// ---------------------------------------------------------------- save / download
const JSZIP_CDN = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
let _jszip = null;
function loadJSZip() {
  // Lazy: only fetched the first time a zip is produced, so the .py-only path
  // and first paint stay library-free.
  return _jszip ??= new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = JSZIP_CDN;
    s.onload = () => resolve(window.JSZip);
    s.onerror = () => { _jszip = null; reject(new Error("JSZip load failed")); };
    document.head.appendChild(s);
  });
}
function downloadBlob(data, filename, type = "application/octet-stream") {
  const blob = data instanceof Blob ? data : new Blob([data], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
async function saveProject() {
  // Always-zip: Download = "my whole project" as a self-contained pygame-project.zip of
  // every .py file + every asset (Branch A's lone-.py fast-path is deleted; the per-row
  // bare-.py download (§3) is the offline escape hatch for a single file). JSZip stays
  // lazy: this is the first place it loads (first PAINT still loads none).
  let JSZip;
  try { JSZip = await loadJSZip(); }
  catch { logLine("Couldn't load the zip library — check your connection.", "sys"); return; }
  const zip = new JSZip();
  const files = project.serialize().files;
  for (const name of Object.keys(files)) zip.file(name, files[name]);
  // Faithful package: an EMPTY __init__.py marker for every .py-bearing dir the user
  // didn't author one in (mirrors the engine's _ensure_init_py; never overwrites).
  for (const init of project._autoInitPaths()) zip.file(init, "");
  for (const rec of await assetStore.getAll()) {
    // Never let an asset clobber a code file at the SAME path (zip.file overwrites).
    // Path keys give folders for free; a clash prefixes the LEAF within its directory
    // (`sprites/ship.py` -> `sprites/asset_ship.py`), keeping the asset in its folder.
    let name = rec.name;
    if (files[rec.name]) {
      const slash = rec.name.lastIndexOf("/");
      name = slash >= 0
        ? rec.name.slice(0, slash + 1) + "asset_" + rec.name.slice(slash + 1)
        : "asset_" + rec.name;
      logLine(`Asset "${rec.name}" clashes with a code file — zipped as "${name}".`, "sys");
    }
    zip.file(name, new Uint8Array(rec.bytes));
  }
  const blob = await zip.generateAsync({ type: "blob" });
  downloadBlob(blob, "pygame-project.zip");
}
document.getElementById("saveBtn").addEventListener("click", saveProject);

// ---- per-item row download (S5 §3): a .py/asset row downloads the BARE item (no zip,
//      no JSZip); a folder row downloads a zip of its SUBTREE (entries relative to it).
// SYNCHRONOUS by design: downloadBlob must run inside the click's user-gesture tick (an
// `await` before it severs the gesture chain — the browser then blocks the synthesized
// <a download> click). So a .py reads its live Doc and an asset reads MEMFS, both sync;
// only the (rare) MEMFS-miss falls back to the async assetStore.
function memfsBytes(path) {
  if (!pyodide) return null;
  try {
    const abs = path.startsWith("/") ? path : pyodide.FS.cwd().replace(/\/$/, "") + "/" + path;
    if (!pyodide.FS.analyzePath(abs).exists) return null;
    return pyodide.FS.readFile(abs);   // Uint8Array, synchronous
  } catch { return null; }
}
function downloadItem(path) {
  if (project.files[path]) {            // a .py file -> bare bytes, NO zip / NO JSZip.
    downloadBlob(project.text(path), basename(path), "text/x-python");
    return;
  }
  // An asset -> bare bytes. Read MEMFS synchronously to keep the user-gesture chain.
  // Pass the raw bytes (not a pre-made Blob) so downloadBlob tags an explicit
  // octet-stream type — a typeless Blob can be mis-handled as navigation, not a download.
  const bytes = memfsBytes(path);
  if (bytes) { downloadBlob(new Uint8Array(bytes), basename(path)); return; }
  // Fallback (MEMFS unavailable / pre-run): the durable assetStore (async; gesture may
  // be lost, but this only triggers when MEMFS has no copy).
  assetStore.getAll().then(recs => {
    const rec = recs.find(r => r.name === path);
    if (!rec) { logLine(`Couldn't find "${path}" to download.`, "sys"); return; }
    downloadBlob(new Blob([new Uint8Array(rec.bytes)]), basename(path));
  });
}
async function downloadFolder(folderPath) {
  let JSZip;
  try { JSZip = await loadJSZip(); }
  catch { logLine("Couldn't load the zip library — check your connection.", "sys"); return; }
  const prefix = folderPath.replace(/\/$/, "") + "/";
  const rel = (p) => p.slice(prefix.length);   // strip the folder prefix -> zip-root-relative
  const zip = new JSZip();
  const codePaths = project.order.filter(p => p.startsWith(prefix));
  for (const p of codePaths) zip.file(rel(p), project.text(p));
  // Auto-__init__.py markers for this subtree (relative), never overwriting a user one.
  for (const init of project._autoInitPaths(folderPath)) if (init.startsWith(prefix)) zip.file(rel(init), "");
  const codeSet = new Set(codePaths);
  for (const rec of await assetStore.getAll()) {
    if (!rec.name.startsWith(prefix)) continue;
    let name = rec.name;
    if (codeSet.has(rec.name)) {        // same per-directory asset_ clash rule as saveProject
      const slash = rec.name.lastIndexOf("/");
      name = rec.name.slice(0, slash + 1) + "asset_" + rec.name.slice(slash + 1);
      logLine(`Asset "${rec.name}" clashes with a code file — zipped as "${name}".`, "sys");
    }
    zip.file(rel(name), new Uint8Array(rec.bytes));
  }
  const blob = await zip.generateAsync({ type: "blob" });
  downloadBlob(blob, basename(folderPath) + ".zip");
}

// The legacy #examples <select> is kept HIDDEN as a compatibility seam: verify.mjs drives it
// via getElementById('examples') + a dispatched change event to load + run the Snake example
// (the asyncify smoke test). The visible, editable Examples rail panel (S4) is the user-facing
// path — see renderExamplesPanel(); this select is the headless test seam only.
exampleSel.addEventListener("change", () => {
  const chosen = EXAMPLES[exampleSel.value];
