  const msg = project.isMulti()
    ? `Replace your whole project (${project.order.length} files) with this example?`
    : "Replace your current code with the example?";
  if (differs && !confirm(msg)) return;
  project.load({ files: { "main.py": chosen } });   // collapse to a one-file project
  viewerSel = "main.py";
  renderViewer("main.py");
  renderTabs();
  run();
});

// ---------------------------------------------------------------- examples rail panel (S4: editable, promote-on-edit)
// Clicking a row PREVIEWS the example in the ONE CodeMirror via swapDoc (NEVER setValue, so lint stays
// unarmed and the preview lives OUTSIDE project.files). The FIRST real edit promotes the live Doc into
// the project (adoptDoc — keystroke + undo preserved), names it from EXAMPLE_FILENAME with an underscore
// auto-suffix on collision, and shows a `●` in both the panel row and the Explorer tree. `↺` (behind the
// native confirm) restores a fresh Doc from the immutable EXAMPLES source.

// The canonical promote filename for an example key (fixed table; slugify fallback for any future key,
// validated against isModuleName so the result is always a real module).
function exampleFilename(key) {
  if (EXAMPLE_FILENAME[key]) return EXAMPLE_FILENAME[key];
  let stem = key.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
  if (!/^[a-z_]/.test(stem)) stem = "_" + stem;
  const cand = (stem || "example") + ".py";
  return isModuleName(cand) ? cand : "example.py";
}
// First free name on collision: bouncy_balls.py -> bouncy_balls_2.py (UNDERSCORE — a hyphen fails
// isModuleName). Returns the base if it's free.
function freePromoteName(base) {
  if (!project.files[base]) return base;
  const stem = base.replace(/\.py$/, "");
  for (let n = 2; ; n++) {
    const cand = `${stem}_${n}.py`;
    if (!project.files[cand]) return cand;
  }
}

// Open an example: select its already-promoted file if one exists, else build a fresh preview Doc and
// swapDoc into it (no setValue → lint stays unarmed → the Doc is not yet a project file).
function openExample(key) {
  if (!(key in EXAMPLES)) return;
  // Re-opening an already-promoted example selects the existing file (no duplicate preview).
  const promoted = Object.keys(exampleOf).find(fn => exampleOf[fn] === key && project.files[fn]);
  if (promoted) {
    previewExample = null;
    renderViewer(promoted);   // .py -> setActive -> swapDoc into the real Doc
    renderTabs();
    renderExamplesPanel();
    return;
  }
  const doc = new CodeMirror.Doc(EXAMPLES[key], "python");   // immutable source -> fresh Doc (own undo)
  previewExample = { name: key, doc };
  editor.swapDoc(doc);                                       // NEVER setValue (landmine b)
  // Viewer chrome: show the ONE CodeMirror in "preview" mode with the prospective filename.
  const cmWrap = editor.getWrapperElement();
  viewerBodyEl.querySelectorAll(".imgview, .sound, .empty").forEach(n => n.remove());
  if (cmWrap.parentElement !== viewerBodyEl) viewerBodyEl.appendChild(cmWrap);
  viewerSel = null;                                          // the preview is not a project file
  vNameEl.textContent = exampleFilename(key);
  vMetaEl.textContent = "· Python · from example";
  runBtnEl.style.display = "";
  editor.refresh();
  renderTabs();                                             // drop any stale .active in the tree
  renderExamplesPanel();                                     // mark this row .sel
}
window.openExample = openExample;   // test seam (mirrors window.newFilePrompt / window.uploadFiles)

// Promote the current preview into the project on its first real edit. Returns the final filename.
function promotePreview() {
  const { name: key, doc } = previewExample;
  const finalName = freePromoteName(exampleFilename(key));
  const taken = finalName !== exampleFilename(key);
  project.adoptDoc(finalName, doc);                          // ADOPT the live Doc (keystroke + undo survive)
  // S6 — a promoted example becomes a real code file (and the new entry); in a room it must reach
  // peers. Mirror the adopt to the shared doc with the Doc's CURRENT text (same shape as
  // newFilePrompt/upload), in ONE atomic roomOp that also moves the entry so the doc invariant
  // (entry is a live key) holds. Without this the promoted file is local-only and S6a's edit-
  // listener won't seed its missing key, leaving it permanently invisible to peers.
  roomOp(d => {
    const k = encPath(finalName);
    d.files[k] = doc.getValue();
    if (!d.order.includes(k)) d.order.push(k);
    d.entry = k;
  });
  exampleOf[finalName] = key;
  modifiedExamples.add(finalName);
  previewExample = null;                                     // it's a real file now, no longer floating
  viewerSel = finalName;
  vNameEl.textContent = finalName;
  vMetaEl.textContent = "· Python";
  if (taken) logLine(`That name was taken — saved your edit as ${finalName}.`, "sys");
  renderTabs();
  renderExamplesPanel();
  flushSave();                                              // synchronous, before the autosave debounce fires
}

// A dedicated change listener (independent of armLint): the FIRST edit of a preview Doc promotes it.
editor.on("change", () => {
  if (previewExample && editor.getDoc() === previewExample.doc) promotePreview();
});

// Reset a promoted+modified example to its immutable source: a FRESH Doc (fresh undo), behind confirm.
function resetExampleFile(fileName) {
  const key = exampleOf[fileName];
  if (!key) return;
  if (!confirm(`Reset "${fileName}" to the original example? Your edits to this file will be lost.`)) return;
  const fresh = new CodeMirror.Doc(EXAMPLES[key], "python");   // FRESH Doc = FRESH undo stack
  project.files[fileName] = fresh;                             // replace the Doc in-place (key unchanged)
  if (project.active === fileName) editor.swapDoc(fresh);       // re-show it (swapDoc, never setValue)
  modifiedExamples.delete(fileName);                           // body == EXAMPLES[key] again -> clear the ●
  renderTabs();
  renderExamplesPanel();
  flushSave();
}

function renderExamplesPanel() {
  const panel = document.getElementById("examplesPanel");
  if (!panel) return;
  panel.innerHTML = Object.keys(EXAMPLES).map(key => {
    const promotedName = Object.keys(exampleOf).find(f => exampleOf[f] === key && project.files[f]);
    const sel = (previewExample && previewExample.name === key) || (promotedName && viewerSel === promotedName);
    const modified = promotedName && modifiedExamples.has(promotedName);
    return `<div class="exrow${sel ? " sel" : ""}" data-ex="${escTab(key)}">` +
      `<span class="ic" aria-hidden="true">🐍</span>` +
      `<span class="nm">${escTab(key)}</span>` +
      (modified ? `<span class="moddot" data-tip="Modified — now your file">●</span>` : "") +
      (modified ? `<button class="reset" title="Reset to the original example" aria-label="Reset ${escTab(key)} to the original">↺</button>` : "") +
      `</div>`;
  }).join("");
}

// One delegated click handler for the panel: a `.reset` click resets (and never opens); anything else
// on a row opens/previews it.
document.getElementById("examplesPanel").addEventListener("click", (e) => {
  const row = e.target.closest(".exrow");
  if (!row) return;
  const key = row.dataset.ex;
  const resetBtn = e.target.closest(".reset");
  if (resetBtn) {
    const fileName = Object.keys(exampleOf).find(f => exampleOf[f] === key && project.files[f]);
    if (fileName) resetExampleFile(fileName);
    return;
  }
  openExample(key);
});

// ---------------------------------------------------------------- activity rail (§3) + roving tabindex (§8.1)
const railEl = document.querySelector("nav.rail");
const acttabs = [...railEl.querySelectorAll('[role="tab"]')];
const panelviews = [...document.querySelectorAll(".panelview")];
const sideEl = document.getElementById("side");
const sideSplitEl = document.querySelector('[data-split="side"]');
let activeView = "explorer";
// Click-collapse (§3.1): a clean toggle. Clicking the rail icon of the currently active AND
// expanded view collapses the side panel (the rail stays visible). Clicking any rail icon while
// the panel is collapsed — or clicking a different view's icon — opens/switches to that view.
// No armed flag: the gesture works for a real user after ANY intervening interaction.

function onViewOpened(v) {
  if (v === "history") { historyOpen = true; historyPanelEl.hidden = false; renderHistory(); }
  else { historyOpen = false; }
  if (v === "examples") renderExamplesPanel();
  if (v === "explorer") { renderTabs(); updateStorageReadout(); }
}
function showView(v) {
  activeView = v;
  sideEl.classList.remove("collapsed");
  sideSplitEl.style.display = "";
  acttabs.forEach(b => {
    const on = b.dataset.view === v;
    b.classList.toggle("active", on);
    b.setAttribute("aria-selected", String(on));
    b.tabIndex = on ? 0 : -1;
  });
  panelviews.forEach(p => { p.hidden = (p.dataset.panel !== v); });
  onViewOpened(v);
}
function collapsePanel() {
  sideEl.classList.add("collapsed");
  sideSplitEl.style.display = "none";
  acttabs.forEach(b => { b.classList.remove("active"); b.setAttribute("aria-selected", "false"); });
}
acttabs.forEach((b, i) => {
  b.addEventListener("click", () => {
    const v = b.dataset.view;
    // Toggle: clicking the active + expanded view's icon collapses; otherwise open/switch.
    if (activeView === v && !sideEl.classList.contains("collapsed")) collapsePanel();
    else showView(v);
  });
  // Roving tabindex + Arrow/Home/End/Enter/Space.
  b.addEventListener("keydown", (e) => {
    let idx = null;
    if (e.key === "ArrowDown" || e.key === "ArrowRight") idx = (i + 1) % acttabs.length;
    else if (e.key === "ArrowUp" || e.key === "ArrowLeft") idx = (i - 1 + acttabs.length) % acttabs.length;
    else if (e.key === "Home") idx = 0;
    else if (e.key === "End") idx = acttabs.length - 1;
    else if (e.key === "Enter" || e.key === " ") { e.preventDefault(); b.click(); return; }
    if (idx != null) { e.preventDefault(); acttabs[idx].focus(); }
  });
});

// ---------------------------------------------------------------- shared hover/focus tooltip (§3.3, §8.2)
(function () {
  const tip = document.createElement("div");
  tip.className = "tooltip"; tip.setAttribute("role", "tooltip");
  document.body.appendChild(tip);
  let cur = null;
  function show(el) {
    const t = el.getAttribute("data-tip"); if (!t) { hide(); return; }
    cur = el; tip.textContent = t;
    const r = el.getBoundingClientRect(), tw = tip.offsetWidth, th = tip.offsetHeight;
    let left, top;
    if (el.getAttribute("data-tip-side") === "right") {
      left = r.right + 8; top = r.top + r.height / 2 - th / 2;
      if (left + tw > window.innerWidth - 6) left = r.left - tw - 8;
      top = Math.max(6, Math.min(top, window.innerHeight - th - 6));
    } else {
      left = r.left + r.width / 2 - tw / 2; left = Math.max(6, Math.min(left, window.innerWidth - tw - 6));
      top = r.bottom + 7; if (top + th > window.innerHeight - 6) top = r.top - th - 7;
    }
    tip.style.left = Math.round(left) + "px"; tip.style.top = Math.round(top) + "px";
    tip.classList.add("show");
  }
  function hide() { cur = null; tip.classList.remove("show"); }
  document.addEventListener("mouseover", e => { const el = e.target.closest && e.target.closest("[data-tip]"); if (el && el !== cur) show(el); });
  document.addEventListener("mouseout", e => { const el = e.target.closest && e.target.closest("[data-tip]"); if (el && (!e.relatedTarget || !el.contains(e.relatedTarget))) hide(); });
  document.addEventListener("focusin", e => { const el = e.target.closest && e.target.closest("[data-tip]"); if (el) show(el); });
  document.addEventListener("focusout", hide);
  document.addEventListener("mousedown", hide);
  document.addEventListener("keydown", e => { if (e.key === "Escape") hide(); });
  window.addEventListener("scroll", hide, true);
})();

// ---------------------------------------------------------------- panes: resizable splitters (§6.1)
const editorPaneEl = document.getElementById("editorPane");
const drawerEl = document.getElementById("drawer");
document.querySelectorAll(".split").forEach(sp => {
  sp.addEventListener("mousedown", (e) => {
    const kind = sp.dataset.split;
    if (kind === "side" && sideEl.classList.contains("collapsed")) return;
    e.preventDefault();
    sp.classList.add("active");
    const startX = e.clientX, startY = e.clientY;
    let startVal;
    if (kind === "side") startVal = sideEl.getBoundingClientRect().width;
    else if (kind === "viewer") startVal = editorPaneEl.getBoundingClientRect().width;
    else startVal = drawerEl.getBoundingClientRect().height;
    document.body.classList.add(kind === "console" ? "resizing-y" : "resizing-x");
    function move(ev) {
      if (kind === "side") {
        const w = Math.max(180, Math.min(440, startVal + (ev.clientX - startX)));
        sideEl.style.flex = "0 0 " + w + "px"; sideEl.style.width = w + "px";
      } else if (kind === "viewer") {
        const w = Math.max(160, startVal + (ev.clientX - startX));
        editorPaneEl.style.flex = "0 0 " + w + "px";
      } else {
        const h = Math.max(60, Math.min(window.innerHeight - 180, startVal - (ev.clientY - startY)));
        drawerEl.style.flex = "0 0 " + h + "px";
      }
    }
    function up() {
      sp.classList.remove("active");
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
      document.body.classList.remove("resizing-x", "resizing-y");
      editor.refresh();
    }
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  });
});

// ---------------------------------------------------------------- pyodide boot
const PYODIDE_BASE = "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/";
let pyodide = null;
let runTask = null;
let engine = null;   // cooperative-engine wrapper (vendor/engine.mjs createEngine); set during boot()

// Engine module (cooperative pygame engine) — lazily imported on a cached promise, the
// SAME pattern as loadAutomerge(): relative + document.baseURI so it resolves under the
// GitHub Pages project subpath. First-paint-neutral (tiny text module). See vendor/engine.mjs.
let _engineCache = null;
function loadEngine() {
  if (_engineCache) return _engineCache;
  _engineCache = import(new URL("./vendor/engine.mjs", document.baseURI).href).then((m) => {
    window.__engineLoaded = true;   // sentinel for tests (mirrors window.__amLoaded)
    return m;
  });
  return _engineCache;
}

// Stage run controls (Pause/End/badge). #runBtn is the Start target in the editor head.
const pauseBtnEl = document.getElementById("pauseBtn");
const stopBtnEl = document.getElementById("stopBtn");
const runFileBadgeEl = document.getElementById("runFileBadge");
const stageHintEl = document.getElementById("stageHint");

function isPaused() {
  return engine ? engine.isPaused() : false;
}

// Single writer for the run-control chrome: Pause/End/badge visibility, the Start
// disabled-while-live affordance, and the explorer highlight. Call after every
// run-state transition (Start, pause, resume, settle, End).
function syncRunControls() {
  const live = !!runFile;            // runFile is the single source of truth for "a program is live"
  const paused = live && isPaused();
  // Pause ⇄ Resume — shown only while live; label/icon toggles with paused.
  pauseBtnEl.hidden = !live;
  pauseBtnEl.textContent = paused ? "▶ Resume" : "⏸ Pause";
  pauseBtnEl.setAttribute("aria-label", paused ? "Resume program" : "Pause program");
  // End (✕) — kept #stopBtn; shown only while live.
  stopBtnEl.hidden = !live;
  // Running-file badge — shown only while live; ▶ running / ⏸ paused + basename.
  if (live) {
    const base = basename(runFile);
    runFileBadgeEl.hidden = false;
    runFileBadgeEl.textContent = (paused ? "⏸ paused: " : "▶ running: ") + base;
  } else {
    runFileBadgeEl.hidden = true;
    runFileBadgeEl.textContent = "";
  }
  // The "press start to run" hint is the idle affordance — hide it while a program is live.
  if (stageHintEl) stageHintEl.hidden = live;
  // USER DECISION (design §0.1 Q0): Start RESTARTS while a program is live, so #runBtn stays ENABLED
  // (never disabled, never display:none). No disabled-Start affordance here — run() cleanly cancels
  // the old task and starts a fresh run on click.
}

async function boot() {
  // The cooperative engine owns the boot sequence (audio-proxy → Pyodide load → canvas/SDL
  // → pygame-ce → BOOT_PY/PROJECT_PY → asset hydrate). The host injects the few things the
  // engine must stay agnostic of: the Pyodide loader (CDN base + version pin live HERE), the
  // canvas element, the #status writer (host owns the exact token strings), the log sink, and
  // asset hydration. CRITICAL: assign the returned instance to the top-level `let pyodide` —
  // ~40 tests reach the interpreter by BARE NAME `pyodide` (not window.pyodide).
  const ENG = await loadEngine();
  engine = engine || ENG.createEngine({ getPyodide: () => pyodide });
  pyodide = await engine.boot({
    loadPyodide: async () => {
      const mod = await import(PYODIDE_BASE + "pyodide.mjs");
      return mod.loadPyodide({ indexURL: PYODIDE_BASE });
    },
    setPyodide: (inst) => { pyodide = inst; },   // publish the instance to the bare-name seam
                                                 // BEFORE hydrate/_memfs/lazy-loaders read it
    canvas: canvasEl,
    setStatus,                                                    // host owns the exact #status tokens
    logSink: { out: (s) => logLine(s, "out"), err: (s) => logLine(s, "err") },
    hydrateAssets: () => assetFS.hydrateAll(),
  });
  return pyodide;
}
const booted = boot().catch((e) => {
  setStatus("error", "boot failed");
  logLine(String(e), "err");
  throw e;
});

// ---------------------------------------------------------------- run / stop
async function run() {
  try { await booted; } catch { return; }
  // USER DECISION (design §0.1 Q0): Start RESTARTS while a program is live — clicking ▶ Start while a
  // program is running OR paused STOPS the current run and immediately runs the open file fresh
  // (exactly ONE live task at a time). The clean cancel happens inside _start/_start_project, which
  // each call _stop() (cancel old task + release the pause gate) BEFORE scheduling the new task, so
  // there are never two concurrent loops and a restart-from-paused clears the pause. NO disabled-Start
  // guard here — #runBtn stays enabled while live.
  clearConsole();
  captureSnapshot();   // fire-and-forget: save this version to history
  canvasEl.focus();
  resumeAudio();
  let task;
  // S6a (G6): drop the `collab.active` term so a MULTI-FILE project in a room runs the
  // project path (_start_project), not the single-file path. A single-file project (depth-1,
  // the collab.mjs case) is still !isMulti() → the single-file path, unchanged.
  const isSingle = !project.isMulti();
  if (isSingle) {
    engine.purgeProjectFiles();
    task = engine.start(editor.getValue());                     // single-file path — snapshots the text NOW
  } else {
    task = engine.startProject(project.serialize().files, project.active);  // #9: the OPEN file is the entry; snapshots EVERY file's Doc text NOW
  }
  runTask = task;
  // #9: the running file is the OPEN (active) file in both paths (the fixed entry is retired).
  runFile = project.active;   // #9: the running file is the OPEN (active) file in both paths
  setStatus("running", "running");
  syncRunControls();
  renderTabs();             // light up the running file's explorer row
  task.then((kind) => {
    if (runTask !== task) return;
    runFile = null; syncRunControls(); renderTabs();
    if (kind === "error") return setStatus("error", "error — see console");
    setStatus("ready", kind === "stopped" ? "stopped" : "finished");
    logLine(kind === "stopped" ? "— stopped —" : "— program finished —", "sys");
  }).catch(() => {
    if (runTask !== task) return;
    runFile = null; syncRunControls(); renderTabs();
    setStatus("ready", "stopped");
  });
}

// Pause ⇄ Resume (stage). Toggles the engine gate; pause keeps the task alive.
function togglePause() {
  if (!engine || !runFile) return;
  if (isPaused()) {
    if (engine.resume()) { setStatus("running", "running"); }
  } else {
    if (engine.pause()) { setStatus("paused", "paused"); }
  }
  syncRunControls();
  renderTabs();             // badge/highlight text tracks paused vs running
}

// Resume any SDL-created Web Audio context on a user gesture (autoplay policy).
function resumeAudio() {
  for (const c of window.__audioContexts || []) {
    if (c.state === "suspended") c.resume().catch(() => {});
  }
}
canvasEl.addEventListener("click", resumeAudio);

document.getElementById("runBtn").addEventListener("click", run);
document.getElementById("stopBtn").addEventListener("click", () => {
  if (engine) engine.stop();   // End — task settle clears runFile + syncs controls
});
pauseBtnEl.addEventListener("click", togglePause);
// Badge click jumps the editor/viewer to the running file (NEVER editor.setValue —
// renderViewer → setActive → swapDoc). Independence: this does not affect the live run.
runFileBadgeEl.addEventListener("click", () => {
  if (runFile) { project.setActive(runFile); renderViewer(runFile); }
});

async function loadAutomerge() {

  const AM = await import(new URL("./vendor/automerge-collab.mjs", document.baseURI).href);

function setLive(state, peers) {
  const dot = document.getElementById("liveDot");
  dot.hidden = !collab.active;
  dot.className = state;                 // '', 'connecting', 'offline'
  document.getElementById("peerCount").textContent = peers ?? 1;
}

function applyingRemoteSet(fn) { collab.applyingRemote = true; try { fn(); } finally { collab.applyingRemote = false; } }

// S6b — route a structural file-op to the shared doc. Runs ONLY in a room, under the remote
// guard so the on("change") it triggers in bindEditor doesn't echo back as a local edit. The
// caller runs the LOCAL project.<op>() FIRST (it validates + may refuse, e.g. last-file delete
// or a duplicate name); roomOp mirrors that successful change to the doc. Keeps Automerge lazy:
// no-op (zero doc access) when solo.
function roomOp(mutator) {
  if (!collab.active || !collab.handle) return;
  applyingRemoteSet(() => collab.handle.change(mutator));
}

// S6b — mirror a file/folder MOVE (rename = move with one re-keyed path) to the shared doc as a
// single copy-and-delete transaction. project.move/rename re-key in place (order positions are
// preserved), so a positional diff of the order before vs after pairs each old key -> new key.
// Copy current text to the new encoded key, delete the old, rewrite order, and fix entry.
function mirrorMove(beforeOrder, afterOrder) {
  if (!collab.active || !collab.handle) return;
  const pairs = [];
  for (let i = 0; i < afterOrder.length && i < beforeOrder.length; i++) {
    if (beforeOrder[i] !== afterOrder[i]) pairs.push([beforeOrder[i], afterOrder[i]]);
  }
  if (!pairs.length) return;
  roomOp(d => {
    for (const [oldPath, newPath] of pairs) {
      const ok = encPath(oldPath), nk = encPath(newPath);
      if (d.files[ok] == null) continue;                       // defensive: nothing to move
      d.files[nk] = String(d.files[ok]);                       // copy value (plain assignment)
      delete d.files[ok];                                       // delete old key
      d.order = d.order.map(k => k === ok ? nk : k);            // rewrite order in place
      if (d.entry === ok) d.entry = nk;                         // keep entry consistent
    }
  });
}

// S6b — mirror one or more file DELETES (a single file or a folder's children) to the shared
// doc: delete each encoded key, filter it out of order, and fix entry from the (already
// locally-repaired) project.entry so the doc invariant `order key-set === files key-set` and
// `entry is a live key` holds. `paths` are the HUMAN paths that were actually removed locally.
function mirrorDeletes(paths) {
  if (!collab.active || !collab.handle || !paths.length) return;
  const gone = new Set(paths.map(encPath));
  roomOp(d => {
    for (const k of gone) delete d.files[k];
    d.order = d.order.filter(k => !gone.has(k));
    if (gone.has(d.entry)) d.entry = encPath(project.entry);    // local entry was already repaired
  });
}

// ---------------------------------------------------------------- S6a encode/decode boundary
// THE ONLY place %2F-encoded keys exist is the shared Automerge doc. The local `project`
// model, #project=, the zip, localStorage and the UI all stay HUMAN paths. enc/dec are
// total inverses for valid module paths (proven by test/spike-collab-paths.mjs). Never
// double-encode: nothing outside encodeProject/docToRecord + per-file updateText sees a key.
const encPath = (p) => encodeURIComponent(p);   // human path -> CRDT key  ("a/b.py" -> "a%2Fb.py")
const decKey  = (k) => decodeURIComponent(k);   // CRDT key -> human path
// project.serialize() returns HUMAN {files,order,entry,emptyDirs,dirOrder}. encodeProject re-keys it
// for the doc; emptyDirs AND dirOrder are dropped (empty folders + folder order aren't in the v1
// shared shape — both are LOCAL-only, like each other). `order`
// drives the key set so a file missing from order can never seed an orphan key.
function encodeProject(rec) {
  const files = {};
  for (const p of rec.order) files[encPath(p)] = rec.files[p];
  return { files, order: rec.order.map(encPath), entry: encPath(rec.entry) };
}
// Materialize a doc into a HUMAN record project.load() consumes (decode the boundary).
function docToRecord(doc) {
  const files = {};
  for (const k of Object.keys(doc.files)) files[decKey(k)] = String(doc.files[k]);
  return { files, order: [...doc.order].map(decKey), entry: decKey(doc.entry) };
}

// Cursor-preserving prefix/suffix splice of `next` onto a CodeMirror.Doc `d`. When `d` is the
// editor's active Doc this preserves the live caret/scroll (the old single-file algorithm,
// verbatim, but on `d`'s coordinate space). Used for BOTH the active and non-active files —
// the non-active Doc has no visible caret to disturb but keeps its own undo history this way
// (a setValue would nuke that Doc's undo stack), and the active Doc keeps the user's caret.
function spliceDoc(d, next) {
  const cur = d.getValue();
  if (cur === next) return;
  let s = 0;
  while (s < cur.length && s < next.length && cur[s] === next[s]) s++;
  let e = 0;
  while (e < cur.length - s && e < next.length - s &&
         cur[cur.length - 1 - e] === next[next.length - 1 - e]) e++;
  const from = d.posFromIndex(s);
  const to = d.posFromIndex(cur.length - e);
  d.replaceRange(next.slice(s, next.length - e), from, to, "+remote");
}

// Pick a surviving active file when the local active was removed remotely: remote entry if it
// still exists, else the first remote-order path, else the first remaining local path.
function pickSurvivingActive(doc) {
  const remote = [...doc.order].map(decKey).filter(p => project.files[p]);
  const entry = decKey(doc.entry);
  if (project.files[entry]) return entry;
  if (remote.length) return remote[0];
  return project.order[0];
}

// Set project.order to the remote order, FILTERED to paths that have a Doc (defensive: a
// transient doc state could list a key mid-add). Appends any local paths the remote order
// omitted so no file with a Doc is ever dropped from the strip.
function reconcileOrder(remoteOrder) {
  const have = remoteOrder.filter(p => project.files[p]);
  const seen = new Set(have);
  for (const p of project.order) if (project.files[p] && !seen.has(p)) { have.push(p); seen.add(p); }
  project.order = have;
}

// The full remote->local reconciliation. Diffs the WHOLE doc against the local project
// (never assumes which file changed): adds remote-only keys (fresh Doc, no lost files),
// removes local-only keys (no ghost tabs, with active-file repair so the editor never points
// at a dead Doc), splices changed text per file (active = cursor-preserving live splice,
// non-active = Doc splice), and reconciles order + entry. ONE renderTabs at the end.
function reconcileFromDoc(doc) {
  const remotePaths = Object.keys(doc.files).map(decKey);       // human paths
  const remoteSet = new Set(remotePaths);
  const localSet = new Set(project.order);

  // (A) ADDED keys: present remotely, absent locally -> fresh Doc + tab (no lost files).
  const added = [];
  for (const p of remotePaths) {
    if (!localSet.has(p)) {
      if (project.add(p, String(doc.files[encPath(p)]))) added.push(p);
      else console.warn("collab: skipped remote-only key with invalid module name:", p);   // S6a-review Minor: don't silently drop
    }
  }

  // (B) CHANGED text in files present in BOTH: active = cursor-preserving live splice on the
  //     editor's Doc; non-active = splice the detached Doc (keeps its undo history + caret).
  for (const p of remotePaths) {
    if (added.includes(p)) continue;                            // just created from remote text — already current
    const d = project.files[p];
    if (!d) continue;
    spliceDoc(d, String(doc.files[encPath(p)]));                // d === active Doc preserves the live caret
  }

  // (C) REMOVED keys: present locally, gone remotely. Repair the active file FIRST (so the
  //     editor never sits on a Doc about to be deleted), then remove. project.remove refuses
  //     to drop the last file, so a removal that would empty the project is skipped (kept).
  const removed = [...localSet].filter(p => !remoteSet.has(p));
  for (const p of removed) {
    if (p === project.active) {
      const survivor = pickSurvivingActive(doc);
      if (survivor && survivor !== p && project.files[survivor]) project.setActive(survivor);
    }
    project.remove(p);
  }

  // (D) ORDER + ENTRY: adopt the remote order (decoded, filtered to live Docs) + entry.
  reconcileOrder([...doc.order].map(decKey));
  const remoteEntry = decKey(doc.entry);
  if (project.files[remoteEntry]) project.entry = remoteEntry;

  renderTabs();                                                 // ONE repaint from the reconciled order
  if (collab.active) collab.renderPeers?.();                    // S6b: repaint remote cursors for the (possibly new) active file
}

function bindEditor() {
  const { updateText } = collab.lib;
  // local edits -> shared doc: push the ACTIVE file's text to its OWN encoded key (not a
  // hardwired ['code']). The editor's Doc is whichever file setActive last swapped in, so a
  // local edit always concerns project.active; switching files needs no rebinding. This
  // listener is IN ADDITION to the autosave editor.on("change") (which returns in a room) —
  // they are disjoint by the collab.active guard.
  editor.on("change", () => {
    if (!collab.active || collab.applyingRemote) return;
    const path = project.active;
    const key = encPath(path);
    const next = editor.getValue();                            // == project.files[path] live Doc
    const doc = collab.handle.doc();
    if (!doc.files || doc.files[key] == null) return;          // structural ops (S6b) create keys; S6a edits seeded files
    if (String(doc.files[key]) === next) return;               // echo backstop
    collab.handle.change(d => updateText(d, ["files", key], next));
  });
  // shared doc -> local: full multi-file reconciliation under the remote guard.
  collab.handle.on("change", ({ doc }) => {
    if (!doc || !doc.files) return;
    applyingRemoteSet(() => reconcileFromDoc(doc));
  });
}
const NAME_ADJ = ["Swift", "Brave", "Clever", "Sly", "Jolly", "Witty", "Cosmic", "Mellow",
  "Plucky", "Zesty", "Nimble", "Cheery", "Snazzy", "Bouncy", "Dapper", "Breezy", "Sunny", "Funky"];
const NAME_ANIMAL = ["Otter", "Panda", "Fox", "Heron", "Lynx", "Gecko", "Wombat", "Tapir",
  "Narwhal", "Puffin", "Koala", "Badger", "Quokka", "Axolotl", "Ferret", "Pangolin", "Manatee", "Stoat"];
const pickFrom = (a) => a[Math.floor(Math.random() * a.length)];
const before = (a, b) => a.line < b.line || (a.line === b.line && a.ch <= b.ch);   // a <= b in doc order

function startPresence() {
  const me = { name: pickFrom(NAME_ADJ) + " " + pickFrom(NAME_ANIMAL),
               color: "hsl(" + Math.floor(Math.random() * 360) + ",70%,60%)" };
  collab.presence = new collab.lib.Presence({ handle: collab.handle });
  collab.presence.start({ initialState: { cursor: { line: 0, ch: 0 }, user: me },
                          heartbeatMs: 5000, peerTtlMs: 60000 });
  editor.on("cursorActivity", () => {
    const head = editor.getCursor("head"), anchor = editor.getCursor("anchor");
    collab.presence.broadcast("cursor", {
      line: head.line, ch: head.ch, anchor: { line: anchor.line, ch: anchor.ch },
      file: encPath(project.active),               // S6b: which file this cursor is in (per-file presence)
    });
  });
  collab.markers = [];
  // In this bundle getPeerStates() returns a PeerStateView whose .value is
  // { [peerId]: { peerId, value: { cursor, user, ... } } } — no .peers() method.
  const renderPeers = () => {
    const peers = Object.values(collab.presence.getPeerStates().value);
    setLive("", peers.length + 1);                 // roster counts EVERYONE regardless of file
    collab.markers.forEach(m => m.clear());
    const here = encPath(project.active);          // S6b: only peers on MY active file get a caret
    collab.markers = peers.flatMap(p => {
      const cur = p.value?.cursor;
      if (!cur || cur.file !== here) return [];    // STRICT (§0.1 Q1): no `file` field => no cursor
      const color = p.value.user?.color || "#fff";
      const marks = [];
      // shared highlight: render the peer's selection as a translucent band in their color
      const a = cur.anchor;
      if (a && (a.line !== cur.line || a.ch !== cur.ch)) {
        const [from, to] = before(a, cur) ? [a, cur] : [cur, a];
        marks.push(editor.markText(from, to,
          { css: "background-color:" + color.replace("hsl(", "hsla(").replace(")", ",0.25)") }));
      }
      // caret + name flag at the head
      const el = document.createElement("span");
      el.className = "remote-cursor";
      el.style.borderColor = color;
      const flag = document.createElement("span");
      flag.className = "remote-flag"; flag.textContent = p.value.user?.name || "peer";
      flag.style.background = color;
      el.appendChild(flag);
      marks.push(editor.setBookmark({ line: cur.line, ch: cur.ch }, { widget: el, insertLeft: true }));
      return marks;
    });
  };
  collab.presence.on("update", renderPeers);
  collab.presence.on("snapshot", renderPeers);
  collab.renderPeers = renderPeers;   // S6b: expose so reconcileFromDoc + file-switch can repaint
}

async function findWithRetry(lib, url, tries = 8, delayMs = 1000) {
  for (let i = 0; i < tries; i++) {
    // Create a fresh Repo each attempt: automerge-repo caches "unavailable" state
    // per Repo instance, so retrying against the same repo returns the cached miss.
    const repo = new lib.Repo({ network: [new lib.WebSocketClientAdapter("wss://sync.automerge.org")] });
    try {
      const h = await repo.find(url);
      // find() resolves to a ready DocHandle or rejects (unavailable/failed)
      if (h && !h.isUnavailable?.()) { collab.repo = repo; return h; }
    } catch (e) { /* relay propagation race — retry */ }
    try { await repo.shutdown?.(); } catch {}   // close this attempt's socket before retrying
    await new Promise(r => setTimeout(r, delayMs));
  }
  return null;
}

async function startRoom() {
  collab.lib = await loadAutomerge();
  // S6a (G1/G2): seed the WHOLE multi-file project (encoded keys) — no more entry-only
  // collapse/confirm. A single-file project is the depth-1 case (one encoded key) so
  // collab.mjs keeps passing. `serialize()` returns human paths; encodeProject re-keys.
  const seed = encodeProject(project.serialize());
  collab.repo = new collab.lib.Repo({ network: [new collab.lib.WebSocketClientAdapter("wss://sync.automerge.org")] });
  collab.handle = collab.repo.create(seed);
  await collab.handle.whenReady();
  location.hash = "#room=" + collab.handle.url;
  await enterRoom();
  copyRoomLink();
}

async function joinRoom(url) {
  collab.starting = true;                       // block a Collaborate click during the join
  try {
    collab.lib = await loadAutomerge();
    // findWithRetry creates fresh Repo instances per attempt and assigns collab.repo on success
    collab.handle = await findWithRetry(collab.lib, url);
    if (!collab.handle) { console.warn("Room not found or unavailable; staying solo."); setLive("offline", 1); return; }
    // S6a (G3): adopt the WHOLE multi-file project — same code path as opening a saved
    // multi-file project, sourced from the doc. project.load rebuilds every file's Doc +
    // swapDoc's the active one, so the joiner shows ALL files (no ghost tabs / no lost files).
    applyingRemoteSet(() => {
      project.load(docToRecord(collab.handle.doc()));
      renderTabs();
      renderViewer(project.active);
    });
    await enterRoom();
  } finally {
    collab.starting = false;
  }
}

async function enterRoom() {
  collab.active = true;
  setLive("", 1);
  document.getElementById("collabBtn").textContent = "🔗 Copy room link";
  if (!collab.bound) { collab.bound = true; bindEditor(); startPresence(); }  // attach listeners once
  renderTabs();   // explorer is always-on; repaint from the (now shared) project.order
}

function copyRoomLink() {
  const url = location.origin + location.pathname + location.hash;
  navigator.clipboard?.writeText(url).then(() => flashBtn("✓ link copied"), () => flashBtn("✓ link in URL bar"));
}
function flashBtn(text) {
  const b = document.getElementById("collabBtn"); b.textContent = text;
  setTimeout(() => { b.textContent = "🔗 Copy room link"; }, 1500);
}

document.getElementById("collabBtn").addEventListener("click", () => {
  if (collab.active) return copyRoomLink();
  if (collab.starting) return;                 // ignore re-entrant clicks while a room is being set up
  collab.starting = true;
  setLive("connecting", 1);
  startRoom().catch((e) => { console.error(e); setLive("offline", 1); })
             .finally(() => { collab.starting = false; });
});
// The Collaboration panel's visible button delegates to the #collabBtn engine seam.
document.getElementById("collabStartBtn").addEventListener("click", () => document.getElementById("collabBtn").click());

addEventListener("offline", () => { if (collab.active) setLive("offline", document.getElementById("peerCount").textContent); });
addEventListener("online",  () => { if (collab.active) setLive("", document.getElementById("peerCount").textContent); });

// Run the default example as soon as Python is up.
booted.then(run).catch(() => {});
</script>
