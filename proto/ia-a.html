<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype A — split + sidebar</title>
<style>
  :root{
    --bg:#14151a; --panel:#1c1e26; --edge:#2c2f3a; --text:#d8dae5; --dim:#8a8fa3;
    --accent:#7bd88f; --warn:#f0a45d; --bad:#ff6e7f;
    --mono:"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font:14px/1.45 -apple-system,"Segoe UI",sans-serif;margin:0;height:100vh;display:flex;flex-direction:column}
  button{font:inherit}
  .btn{background:#262936;color:var(--text);border:1px solid var(--edge);border-radius:6px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s}
  .btn:hover{background:#2e3140;border-color:#3a3e4d}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .btn.primary{background:#234430;border-color:#2f6a44;color:#b8f0c6;font-weight:600}
  .btn.primary:hover{background:#2a5239;border-color:#3a7e53}
  .btn.stop{color:var(--bad);background:#3a2329;border-color:#6a2f38;font-weight:600}
  .btn.stop:hover{background:#47292f}

  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--edge);flex:0 0 auto}
  .title{font-size:15px;font-weight:600;margin-right:8px;white-space:nowrap}
  .title .pg{color:var(--accent)}
  .tb-sep{width:1px;height:22px;background:var(--edge);margin:0 4px}
  .spacer{flex:1}
  .status{padding:4px 10px;border-radius:99px;background:#20222c;border:1px solid var(--edge);color:var(--dim);font-size:12px;white-space:nowrap}
  .status.running{color:var(--accent);border-color:#2f6a44}
  .switcher{display:flex;gap:2px;align-items:center;margin-left:4px}
  .switcher a{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;color:var(--dim);text-decoration:none;font-size:12px;border:1px solid transparent}
  .switcher a:hover{background:#262936;border-color:var(--edge)}
  .switcher a.cur{color:var(--accent);font-weight:700;border-color:#2f6a44;background:#20222c}
  .proto-tag{position:fixed;bottom:6px;right:10px;font-size:10px;color:var(--dim);opacity:.6;pointer-events:none;z-index:50}
  .icbtn{padding:5px 9px}

  /* ---------- Layout ---------- */
  .stage-wrap{display:flex;flex:1;min-height:0}
  .splitter-v{flex:0 0 6px;background:var(--edge);cursor:col-resize;transition:background .12s}
  .splitter-v:hover{background:var(--accent)}
  .splitter-h{flex:0 0 6px;background:var(--edge);cursor:row-resize;transition:background .12s}
  .splitter-h:hover{background:var(--accent)}

  /* ---------- Sidebar ---------- */
  .sidebar{flex:0 0 210px;background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .side-tabs{display:flex;border-bottom:1px solid var(--edge);flex:0 0 auto}
  .side-tab{flex:1;padding:8px 0;text-align:center;font-size:12px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
  .side-tab:hover{color:var(--text)}
  .side-tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .side-body{flex:1;overflow:auto;min-height:0}
  .side-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)}
  .newfile{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px}
  .newfile:hover{background:#262936}

  /* file tree rows */
  .row{display:flex;align-items:center;gap:7px;padding:4px 10px;cursor:pointer;font-size:13px;position:relative;border-left:2px solid transparent}
  .row:hover{background:#23262f}
  .row.sel{background:#23303a;border-left-color:var(--accent)}
  .row .ic{width:16px;text-align:center;flex:0 0 16px;font-size:13px}
  .row .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .entry{color:var(--accent);font-size:11px;flex:0 0 auto}
  .row .warn{color:var(--warn);flex:0 0 auto}
  .row .more{opacity:0;color:var(--dim);flex:0 0 auto;padding:0 2px;border-radius:3px}
  .row:hover .more{opacity:1}
  .row .more:hover{color:var(--text);background:#33363f}
  .pyicon{color:#4b8bbe}
  .pyicon b{color:#ffd43b}

  /* history */
  .hist-row{padding:8px 10px;border-bottom:1px solid #23252e;cursor:pointer}
  .hist-row:hover{background:#23262f}
  .hist-top{display:flex;justify-content:space-between;align-items:baseline}
  .hist-when{font-size:13px}
  .hist-files{font-size:11px;color:var(--dim)}
  .hist-diff{margin-top:3px;font-size:11px;font-family:var(--mono);display:none;align-items:center;gap:8px}
  .hist-row.open .hist-diff{display:flex}
  .diff-add{color:var(--accent)}
  .diff-del{color:var(--bad)}
  .restore{margin-left:auto;background:#262936;border:1px solid var(--edge);color:var(--text);font-size:11px;padding:2px 8px;border-radius:5px;cursor:pointer}
  .restore:hover{background:#2e3140}

  .side-foot{flex:0 0 auto;border-top:1px solid var(--edge);padding:8px 10px}
  .ex-btn{width:100%;justify-content:center}

  /* ---------- Center viewer ---------- */
  .center{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .viewer-head{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--edge);background:var(--panel);font-size:12px;color:var(--dim);flex:0 0 auto}
  .viewer-head .vname{color:var(--text);font-weight:600}
  .viewer-body{flex:1;overflow:auto;min-height:0;position:relative}

  /* code editor */
  .editor{display:flex;font-family:var(--mono);font-size:13px;line-height:1.55;min-height:100%}
  .gutter{flex:0 0 auto;text-align:right;padding:10px 8px 10px 12px;color:#5a5f72;user-select:none;background:#181a21;border-right:1px solid var(--edge)}
  .gutter div{height:1.55em}
  .code{flex:1;padding:10px 14px;white-space:pre;overflow-x:auto;color:var(--text);tab-size:4}
  .k{color:#c98bdb}    /* keyword */
  .s{color:#9ecb78}    /* string */
  .c{color:#6b7185;font-style:italic} /* comment */
  .fn{color:#7bd0e0}   /* func/class name */
  .n{color:var(--warn)}/* number */

  /* image viewer */
  .img-view{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .checker{width:180px;height:180px;border-radius:8px;border:1px solid var(--edge);display:flex;align-items:center;justify-content:center;
    background-image:linear-gradient(45deg,#23252e 25%,transparent 25%),linear-gradient(-45deg,#23252e 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#23252e 75%),linear-gradient(-45deg,transparent 75%,#23252e 75%);
    background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;background-color:#1a1c23}
  .cap{font-size:12px;color:var(--dim)}

  /* sound player */
  .snd-view{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
  .player{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:12px 16px;width:min(420px,90%)}
  .play{flex:0 0 auto;width:38px;height:38px;border-radius:50%;background:#234430;border:1px solid #2f6a44;color:#b8f0c6;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
  .play:hover{background:#2a5239}
  .wave{flex:1;height:38px}
  .snd-warn{width:min(420px,90%);background:#3a2e1d;border:1px solid #6a4f2f;color:var(--warn);font-size:12px;padding:8px 12px;border-radius:8px}

  /* empty state */
  .empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--dim);font-size:13px;padding:24px}

  /* ---------- Right column ---------- */
  .right{flex:0 0 340px;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .stage-pane{flex:1;display:flex;flex-direction:column;min-height:0}
  .pane-head{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--edge);background:var(--panel);font-size:12px;color:var(--dim);flex:0 0 auto}
  .stage-area{flex:1;position:relative;min-height:0;background:#0c0d12;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #stage{width:100%;height:100%;display:block}
  .fs{position:absolute;top:6px;right:8px;background:rgba(20,21,26,.7);border:1px solid var(--edge);color:var(--dim);border-radius:5px;cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
  .fs:hover{color:var(--text)}
  .console-pane{flex:0 0 150px;display:flex;flex-direction:column;min-height:0}
  .console{flex:1;background:#121318;font-family:var(--mono);font-size:12px;line-height:1.5;padding:8px 12px;overflow:auto;min-height:0}
  .console .sys{color:var(--dim);font-style:italic}
  .console .err{color:var(--bad)}
  .console .ok{color:var(--accent)}

  /* ---------- Examples popover ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100}
  .overlay.show{display:flex}
  .popover{width:min(680px,92vw);max-height:80vh;background:var(--panel);border:1px solid var(--edge);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden}
  .pop-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--edge)}
  .pop-head h3{margin:0;font-size:14px}
  .pop-head .ro{font-size:11px;color:var(--dim)}
  .pop-x{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;line-height:1}
  .pop-x:hover{color:var(--text)}
  .pop-body{display:flex;min-height:0;flex:1}
  .ex-list{flex:0 0 180px;border-right:1px solid var(--edge);overflow:auto}
  .ex-item{padding:8px 14px;cursor:pointer;font-size:13px;border-left:2px solid transparent}
  .ex-item:hover{background:#23262f}
  .ex-item.sel{background:#23303a;border-left-color:var(--accent)}
  .ex-code-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
  .ex-codebar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--edge);font-size:11px;color:var(--dim)}
  .ex-code{flex:1;overflow:auto;margin:0;padding:12px 14px;font-family:var(--mono);font-size:12px;line-height:1.55;white-space:pre;color:var(--text)}
  .copy-btn{background:#262936;border:1px solid var(--edge);color:var(--text);font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer}
  .copy-btn:hover{background:#2e3140}

  [title]{position:relative}
</style>
</head>
<body>

<!-- ===================== TOOLBAR ===================== -->
<div class="toolbar">
  <span class="title">🐍 pygame <span class="pg">playground</span></span>
  <span style="font-size:11px;color:var(--dim)">A · classic split + explorer sidebar</span>
  <span class="tb-sep"></span>
  <button id="runBtn" class="btn primary" aria-label="Start program">▶ Start</button>
  <button class="btn icbtn" aria-label="Upload files" title="Upload files">⬆ Upload</button>
  <button class="btn icbtn" aria-label="Download project zip" title="Download project .zip">⬇ Download</button>
  <button class="btn icbtn" aria-label="Collaborate" title="Collaborate">👥 Collaborate</button>
  <span class="spacer"></span>
  <span id="status" class="status">ready</span>
  <span class="switcher" role="navigation" aria-label="Prototype switcher">
    <a href="ia-a.html" class="cur" aria-current="page" title="Prototype A">A</a>
    <a href="ia-b.html" title="Prototype B">B</a>
    <a href="ia-c.html" title="Prototype C">C</a>
  </span>
</div>

<!-- ===================== MAIN ===================== -->
<div class="stage-wrap">

  <!-- ---------- SIDEBAR ---------- -->
  <aside class="sidebar" id="sidebar">
    <div class="side-tabs">
      <button class="side-tab active" data-tab="files">Files</button>
      <button class="side-tab" data-tab="history">History</button>
    </div>

    <!-- Files tab -->
    <div class="side-body" id="tab-files">
      <div class="side-head">
        <span>Explorer</span>
        <button class="newfile" aria-label="New file" title="New file">+ New file</button>
      </div>
      <div id="tree"></div>
    </div>

    <!-- History tab -->
    <div class="side-body" id="tab-history" style="display:none">
      <div class="side-head"><span>Run snapshots</span></div>
      <div id="histlist"></div>
    </div>

    <div class="side-foot">
      <button class="btn ex-btn" id="examplesBtn" aria-label="Open examples">💡 Examples</button>
    </div>
  </aside>

  <div class="splitter-v" title="Drag to resize"></div>

  <!-- ---------- CENTER VIEWER ---------- -->
  <section class="center">
    <div class="viewer-head">
      <span class="vname" id="viewerName">main.py</span>
      <span id="viewerMeta">Python · entry point</span>
    </div>
    <div class="viewer-body" id="viewerBody"></div>
  </section>

  <div class="splitter-v" title="Drag to resize"></div>

  <!-- ---------- RIGHT COLUMN ---------- -->
  <aside class="right">
    <div class="stage-pane">
      <div class="pane-head">🎮 Stage</div>
      <div class="stage-area">
        <canvas id="stage" width="340" height="240"></canvas>
        <button class="fs" id="fsBtn" aria-label="Fullscreen stage" title="Fullscreen">⛶</button>
      </div>
    </div>
    <div class="splitter-h" title="Drag to resize"></div>
    <div class="console-pane">
      <div class="pane-head">Console</div>
      <div class="console" id="console"></div>
    </div>
  </aside>

</div>

<span class="proto-tag">prototype · visual only</span>

<!-- ===================== EXAMPLES POPOVER ===================== -->
<div class="overlay" id="exOverlay">
  <div class="popover" role="dialog" aria-modal="true" aria-label="Examples">
    <div class="pop-head">
      <h3>💡 Examples <span class="ro">— read-only, copy into your project</span></h3>
      <button class="pop-x" id="exClose" aria-label="Close examples">✕</button>
    </div>
    <div class="pop-body">
      <div class="ex-list" id="exList"></div>
      <div class="ex-code-wrap">
        <div class="ex-codebar">
          <span id="exTitle">Bouncing ball</span>
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
        <pre class="ex-code" id="exCode"></pre>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   FILE MODEL
   ============================================================ */
const PY_MAIN = `<span class="c"># main.py — bounce a ship around the screen</span>
<span class="k">import</span> pygame, sys
<span class="k">from</span> enemy <span class="k">import</span> Enemy

pygame.init()
screen = pygame.display.set_mode((<span class="n">480</span>, <span class="n">320</span>))
clock  = pygame.time.Clock()
enemy  = <span class="fn">Enemy</span>(<span class="n">120</span>, <span class="n">80</span>)

x, y, dx, dy = <span class="n">40</span>, <span class="n">40</span>, <span class="n">3</span>, <span class="n">2</span>
<span class="k">while</span> <span class="k">True</span>:
    <span class="k">for</span> e <span class="k">in</span> pygame.event.get():
        <span class="k">if</span> e.type == pygame.QUIT:
            pygame.quit(); sys.exit()

    x += dx; y += dy
    <span class="k">if</span> x < <span class="n">0</span> <span class="k">or</span> x > <span class="n">456</span>: dx = -dx
    <span class="k">if</span> y < <span class="n">0</span> <span class="k">or</span> y > <span class="n">296</span>: dy = -dy

    screen.fill((<span class="n">12</span>, <span class="n">13</span>, <span class="n">18</span>))
    enemy.<span class="fn">update</span>(); enemy.<span class="fn">draw</span>(screen)
    pygame.draw.rect(screen, (<span class="n">123</span>, <span class="n">216</span>, <span class="n">143</span>), (x, y, <span class="n">24</span>, <span class="n">24</span>))
    pygame.display.flip()
    clock.tick(<span class="n">60</span>)`;

const PY_ENEMY = `<span class="c"># enemy.py — a tiny drifting enemy sprite</span>
<span class="k">import</span> pygame

<span class="k">class</span> <span class="fn">Enemy</span>:
    <span class="k">def</span> <span class="fn">__init__</span>(self, x, y):
        self.x, self.y = x, y
        self.vx = <span class="n">1.5</span>

    <span class="k">def</span> <span class="fn">update</span>(self):
        self.x += self.vx
        <span class="k">if</span> self.x < <span class="n">0</span> <span class="k">or</span> self.x > <span class="n">456</span>:
            self.vx = -self.vx

    <span class="k">def</span> <span class="fn">draw</span>(self, screen):
        color = (<span class="n">240</span>, <span class="n">164</span>, <span class="n">93</span>)
        pygame.draw.circle(screen, color, (<span class="k">int</span>(self.x), <span class="k">int</span>(self.y)), <span class="n">10</span>)`;

const SHIP_SVG = `<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="ship sprite">
  <polygon points="32,6 50,52 32,42 14,52" fill="#7bd88f"/>
  <polygon points="32,14 32,40 22,46" fill="#5bbf72"/>
  <circle cx="32" cy="28" r="5" fill="#14151a"/>
  <polygon points="32,52 26,62 38,62" fill="#f0a45d"/>
</svg>`;

function waveSVG(){
  let bars='';
  for(let i=0;i<34;i++){
    const h = 6 + Math.abs(Math.sin(i*0.6))*26;
    bars += `<rect x="${i*9}" y="${(38-h)/2}" width="5" height="${h}" rx="2" fill="${i%5===0?'#7bd88f':'#3a3e4d'}"/>`;
  }
  return `<svg class="wave" viewBox="0 0 306 38" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
}

const FILES = {
  'main.py':  {type:'py',  icon:'py', entry:true,  meta:'Python · entry point', code:PY_MAIN,  lines:30},
  'enemy.py': {type:'py',  icon:'py', meta:'Python', code:PY_ENEMY, lines:18},
  'ship.png': {type:'img', icon:'🖼', meta:'Image · PNG'},
  'blip.wav': {type:'snd', icon:'🔊', meta:'Sound · WAV'},
  'tune.mp3': {type:'snd', icon:'🔊', meta:'Sound · MP3', warn:true},
  'notes.txt':{type:'txt', icon:'📁', meta:'Text file'},
};

/* ============================================================
   FILE TREE RENDER
   ============================================================ */
let selected = 'main.py';
const treeEl = document.getElementById('tree');

function fileIcon(f){
  if(f.icon==='py') return `<span class="ic pyicon" aria-hidden="true">&lt;<b>py</b>&gt;</span>`;
  return `<span class="ic" aria-hidden="true">${f.icon}</span>`;
}

function renderTree(){
  treeEl.innerHTML='';
  for(const [name,f] of Object.entries(FILES)){
    const row=document.createElement('div');
    row.className='row'+(name===selected?' sel':'');
    row.tabIndex=0;
    row.setAttribute('role','button');
    row.setAttribute('aria-label', name + (f.entry?' (entry point)':''));
    row.innerHTML = fileIcon(f)
      + `<span class="nm">${name}</span>`
      + (f.entry?`<span class="entry" title="Entry point">▸ entry</span>`:'')
      + (f.warn?`<span class="warn" title="plays in this viewer, but not in pygame — convert to WAV/OGG">⚠</span>`:'')
      + `<span class="more" title="Rename · delete" aria-label="More actions">⋯</span>`;
    row.addEventListener('click',()=>select(name));
    row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();select(name);}});
    treeEl.appendChild(row);
  }
}

function select(name){
  selected=name;
  renderTree();
  renderViewer();
}

/* ============================================================
   VIEWER RENDER (type-aware swap)
   ============================================================ */
const viewerBody=document.getElementById('viewerBody');
const viewerName=document.getElementById('viewerName');
const viewerMeta=document.getElementById('viewerMeta');

function renderViewer(){
  const f=FILES[selected];
  viewerName.textContent=selected;
  viewerMeta.textContent=f.meta;
  if(f.type==='py'){
    let gutter='';
    for(let i=1;i<=f.lines;i++) gutter+=`<div>${i}</div>`;
    viewerBody.innerHTML=`<div class="editor"><div class="gutter">${gutter}</div><div class="code">${f.code}</div></div>`;
  } else if(f.type==='img'){
    viewerBody.innerHTML=`<div class="img-view"><div class="checker">${SHIP_SVG}</div><div class="cap">ship.png · 64×64 · PNG</div></div>`;
  } else if(f.type==='snd'){
    const isMp3=selected==='tune.mp3';
    viewerBody.innerHTML=`<div class="snd-view">
        <div class="player">
          <button class="play" aria-label="Play sound" onclick="this.textContent=this.textContent==='▶'?'■':'▶'">▶</button>
          ${waveSVG()}
        </div>
        <div class="cap">${selected} · ${isMp3?'MP3':'WAV'}</div>
        ${isMp3?`<div class="snd-warn">⚠ Plays here, but pygame's audio can't load MP3 — convert to WAV or OGG.</div>`:''}
      </div>`;
  } else {
    viewerBody.innerHTML=`<div class="empty">Can't preview ${selected} — only code, images, and sounds open here.</div>`;
  }
}

/* ============================================================
   SIDEBAR TABS
   ============================================================ */
document.querySelectorAll('.side-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.side-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const which=tab.dataset.tab;
    document.getElementById('tab-files').style.display = which==='files'?'':'none';
    document.getElementById('tab-history').style.display = which==='history'?'':'none';
  });
});

/* ============================================================
   UNIFIED START / STOP + STAGE + CONSOLE
   ============================================================ */
const runBtn=document.getElementById('runBtn');
const statusEl=document.getElementById('status');
const consoleEl=document.getElementById('console');
const canvas=document.getElementById('stage');
const ctx=canvas.getContext('2d');
let running=false, raf=null;
let bx=40,by=40,bdx=2.6,bdy=1.9,ex=120,evx=1.5,score=0,frame=0;

function logLine(text,cls){
  const d=document.createElement('div');
  if(cls) d.className=cls;
  d.textContent=text;
  consoleEl.appendChild(d);
  consoleEl.scrollTop=consoleEl.scrollHeight;
}
function seedConsole(){
  consoleEl.innerHTML='';
  logLine('pygame 2.5 (SDL 2.28)');
  logLine('Hello from main.py');
  logLine('— program finished —','sys');
}

function fitCanvas(){
  const r=canvas.parentElement.getBoundingClientRect();
  canvas.width=Math.max(60,r.width);
  canvas.height=Math.max(60,r.height);
}

function drawFrame(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#0c0d12';ctx.fillRect(0,0,W,H);
  // moving enemy
  ex+=evx; if(ex<14||ex>W-14) evx=-evx;
  ctx.fillStyle='#f0a45d';
  ctx.beginPath();ctx.arc(ex,H*0.32,9,0,Math.PI*2);ctx.fill();
  // bouncing ship
  bx+=bdx;by+=bdy;
  if(bx<0||bx>W-22){bdx=-bdx;score++;}
  if(by<0||by>H-22){bdy=-bdy;score++;}
  ctx.fillStyle='#7bd88f';
  ctx.fillRect(bx,by,22,22);
  // score
  ctx.fillStyle='#d8dae5';
  ctx.font='13px "SF Mono",Menlo,monospace';
  ctx.fillText('score '+score,10,20);
  frame++;
  if(running) raf=requestAnimationFrame(drawFrame);
}

function startRun(){
  running=true;
  runBtn.textContent='■ Stop';
  runBtn.classList.remove('primary');
  runBtn.classList.add('stop');
  runBtn.setAttribute('aria-label','Stop program');
  statusEl.textContent='running';
  statusEl.classList.add('running');
  // fresh start clears console
  consoleEl.innerHTML='';
  logLine('pygame 2.5 (SDL 2.28)');
  logLine('Running main.py…','ok');
  fitCanvas();
  score=0;frame=0;bx=40;by=40;
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(drawFrame);
}

function stopRun(){
  running=false;
  cancelAnimationFrame(raf);   // canvas freezes on last frame (not cleared)
  runBtn.textContent='▶ Start';
  runBtn.classList.remove('stop');
  runBtn.classList.add('primary');
  runBtn.setAttribute('aria-label','Start program');
  statusEl.textContent='stopped';
  statusEl.classList.remove('running');
  logLine('— stopped —','sys');
  setTimeout(()=>{ if(!running) statusEl.textContent='ready'; },1100);
}

runBtn.addEventListener('click',()=> running?stopRun():startRun());

document.getElementById('fsBtn').addEventListener('click',()=>{
  const el=canvas.parentElement;
  if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
});

screen = pygame.display.set_mode((400, 300))
x, y, dx, dy = 50, 50, 4, 3
while True:
    for e in pygame.event.get():
        if e.type == pygame.QUIT: exit()
    x += dx; y += dy
    if x < 0 or x > 380: dx = -dx

    pygame.display.flip()`,
  'Snake':`# Classic snake — arrow keys to steer
import pygame, random
pygame.init()
# ... grid, snake list, food, collision ...
# (full example in the playground)`,
  'Pong':`# Pong — two paddles, one ball
import pygame
pygame.init()
# ... paddles, ball physics, scoring ...`,
  'Starfield':`# Starfield — stars streaming toward you
import pygame, random
stars = [[random.random(), random.random()] for _ in range(200)]
# ... project and move stars ...`,
  'Platformer':`# Platformer — gravity + jump
import pygame
GRAVITY = 0.6
# ... player rect, platforms, collision ...`,
  'Particles':`# Particles — emit + fade
import pygame, random
particles = []
# ... spawn, update life, draw with alpha ...`,
};
const exList=document.getElementById('exList');
const exCode=document.getElementById('exCode');
const exTitle=document.getElementById('exTitle');
let exSel=Object.keys(EXAMPLES)[0];

function renderExamples(){
  exList.innerHTML='';
  Object.keys(EXAMPLES).forEach(name=>{
    const it=document.createElement('div');
    it.className='ex-item'+(name===exSel?' sel':'');
    it.textContent=name;
    it.tabIndex=0;
    it.addEventListener('click',()=>{exSel=name;renderExamples();});
    it.addEventListener('keydown',e=>{if(e.key==='Enter'){exSel=name;renderExamples();}});
    exList.appendChild(it);
  });
  exTitle.textContent=exSel;
  exCode.textContent=EXAMPLES[exSel];
}
const exOverlay=document.getElementById('exOverlay');
document.getElementById('examplesBtn').addEventListener('click',()=>{renderExamples();exOverlay.classList.add('show');});
document.getElementById('exClose').addEventListener('click',()=>exOverlay.classList.remove('show'));
exOverlay.addEventListener('click',e=>{if(e.target===exOverlay) exOverlay.classList.remove('show');});

const copyBtn=document.getElementById('copyBtn');
copyBtn.addEventListener('click',()=>{
  const txt=EXAMPLES[exSel];
  const done=()=>{copyBtn.textContent='✓ Copied';setTimeout(()=>copyBtn.textContent='Copy',1200);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(done);
  } else { done(); }
});

   ============================================================ */
renderTree();
renderViewer();
seedConsole();
window.addEventListener('resize',()=>{ if(!running) fitCanvas(); });
fitCanvas();
